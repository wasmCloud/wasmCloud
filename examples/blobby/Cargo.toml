[package]
name = "blobby"
version = "0.6.0"
authors = ["wasmCloud Team"]
edition = "2024"

[lib]
crate-type = ["cdylib"]
name = "blobby"

[workspace]

[dependencies]
wstd = "0.6"
wit-bindgen = "0.51"
wasip2 = "1.0"
serde_json = "1.0"

[profile.release]
# Optimize for small code size
lto = true
opt-level = "s"
strip = true
