[package]
name = "component-server"
edition.workspace = true
version.workspace = true

[lints]
workspace = true

[lib]
crate-type = ["cdylib"]

[package.metadata.cargo-machete]
ignored = ["prost", "tonic-prost"]

[dependencies]
wstd = "0.6"
tonic = { version = "0.14", default-features = false, features = ["codegen"] }
tonic-prost = "0.14"
prost = "0.14"
tower-service = { version = "0.3.3" }
http = "1.4"
http-body-util = "0.1"
anyhow = "1"

[build-dependencies]
tonic-prost-build = "0.14"
