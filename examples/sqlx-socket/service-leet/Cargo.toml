[package]
name = "service-leet"
version = "0.1.0"
edition.workspace = true

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true }
wasip3 = "0.5.0"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
sqlx = { git = "https://github.com/Aditya1404Sal/sqlx", branch = "latest/wasip3", features = ["tls-native-tls"] }
