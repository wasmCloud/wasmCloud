[package]
name = "oci-registry"
version = "0.1.0"
authors = ["wasmCloud Team"]
edition = "2024"

[lib]
crate-type = ["cdylib"]
name = "oci_registry"

[lints]
workspace = true

[workspace]

[workspace.lints.rust]
warnings = "deny"
# wit-bindgen's async codegen (the `generate!`/`export!` macros) emits `unsafe`
# blocks into this crate, so `unsafe_code` cannot be denied here.
unused_extern_crates = "warn"
trivial_numeric_casts = "warn"
unstable_features = "warn"
unused_import_braces = "warn"
unused-lifetimes = "warn"
unused-macro-rules = "warn"

[workspace.lints.clippy]
unwrap_used = 'deny'
expect_used = 'deny'
panic = 'deny'
indexing_slicing = 'deny'
dbg_macro = 'deny'
join_absolute_paths = 'deny'
needless_collect = 'deny'
option_env_unwrap = 'deny'
panicking_unwrap = 'deny'
serde_api_misuse = 'deny'
transmute_ptr_to_ref = 'deny'
transmute_undefined_repr = 'deny'
trivially_copy_pass_by_ref = 'deny'
uninit_vec = 'deny'
unnecessary_box_returns = 'deny'

[dependencies]
# wasip3 async bindings (native streams/futures). The async features pull in the
# component-model async runtime used by the generated blobstore + HTTP code.
wit-bindgen = { version = "0.58.0", features = ["async-spawn", "inter-task-wakeup"] }
serde_json = "1.0"
sha2 = "0.10"
hex = "0.4"

[profile.release]
# Optimize for small code size
lto = true
opt-level = "s"
strip = true
