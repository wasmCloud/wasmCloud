{{- if .Values.runtime.serviceAccount.create -}}
{{- /*
  Render one ServiceAccount per unique namespace targeted by runtime.hostGroups.
  Each host pod's Deployment references serviceAccountName: {{ include
  "runtime.serviceAccountName" . }}, and that name resolves *within the Pod's
  own namespace* — so when a hostGroup overrides .namespace, an SA with the
  same name must exist in that namespace too. The chart's release namespace
  is always included as a fallback for hostGroups without an override.
*/}}
{{- $namespaces := dict }}
{{- $_ := set $namespaces .Release.Namespace true }}
{{- range .Values.runtime.hostGroups }}
{{- $ns := default $.Release.Namespace .namespace }}
{{- $_ := set $namespaces $ns true }}
{{- end }}
{{- range $ns, $_ := $namespaces }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "runtime.serviceAccountName" $ }}
  namespace: {{ $ns }}
  labels:
    {{- include "runtime-operator.labels" $ | nindent 4 }}
  {{- with $.Values.runtime.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
