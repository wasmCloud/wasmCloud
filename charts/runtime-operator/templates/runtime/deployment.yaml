{{- $top := . }}
{{- range .Values.runtime.hostGroups }}
{{- $ns := default $top.Release.Namespace .namespace }}
{{- /* Per-hostgroup image: `.image.{registry,repository,tag}` override the
       chart-wide runtime.image, so one release can mix host versions (e.g. an
       all-features host for one group and the shipped image for another). */}}
{{- $hi := default (dict) .image }}
{{- $imgRegistry := $hi.registry | default $top.Values.runtime.image.registry | default $top.Values.global.image.registry }}
{{- $imgRepo := $hi.repository | default $top.Values.runtime.image.repository }}
{{- $imgTag := $hi.tag | default $top.Values.runtime.image.tag | default $top.Chart.AppVersion }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostgroup-{{ .name }}
  namespace: {{ $ns }}
  labels:
    wasmcloud.com/name: hostgroup
    wasmcloud.com/hostgroup: {{ .name }}
    {{- include "runtime-operator.labels" $top | nindent 4 }}
spec:
  replicas: {{ .replicas }}
  selector:
    matchLabels:
      wasmcloud.com/name: hostgroup
      wasmcloud.com/hostgroup: {{ .name }}
  template:
    metadata:
      labels:
        wasmcloud.com/name: hostgroup
        wasmcloud.com/hostgroup: {{ .name }}
        {{- include "runtime.podLabels" $top | nindent 8 }}
      {{- with $top.Values.runtime.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: {{ $top.Values.runtime.automountServiceAccountToken }}
      securityContext:
        {{- toYaml $top.Values.runtime.podSecurityContext | nindent 8 }}
      volumes:
        - name: oci-cache
          emptyDir: {}
        # wash creates its data/config/cache directories under $HOME (set to /tmp
        # below), so the host needs a writable /tmp to run with a read-only root
        # filesystem.
        - name: tmp
          emptyDir: {}
        {{- if $top.Values.global.tls.enabled }}
        - name: runtime-cert
          secret:
            secretName: {{ $top.Values.global.certificates.runtimeCertSecretName }}
        - name: data-cert
          secret:
            secretName: {{ $top.Values.global.certificates.dataCertSecretName }}
        {{- if and (.http) (.http.enabled) (.http.tls) (.http.tls.enabled) }}
        - name: tls-cert
          secret:
            secretName: {{ if and (.http.tls.certificate) (.http.tls.certificate.secretName) }}{{ .http.tls.certificate.secretName }}{{ else }}hostgroup-{{ .name }}-http-tls{{ end }}
        {{- end }}
        {{- end }}
        {{- /* Optional pod volumes (e.g. ConfigMap / Secret mounts). Rendered
               unconditionally — outside the global.tls.enabled guard above —
               so they survive a TLS-off install. */}}
        {{- with .volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      serviceAccountName: {{ include "runtime.serviceAccountName" $top }}
      {{- include "runtime-operator.imagePullSecrets" $top | nindent 6 }}
      containers:
        - name: host
          image: {{ if $imgRegistry }}{{ printf "%s/%s" $imgRegistry $imgRepo }}{{ else }}{{ $imgRepo }}{{ end }}:{{ $imgTag }}
          env:
            # wash resolves its XDG data/config/cache dirs under $HOME; point it
            # at the writable /tmp emptyDir so the host runs with a read-only root
            # filesystem. A user-supplied runtime.env HOME (below) overrides this.
            - name: HOME
              value: /tmp
            - name: WASMCLOUD_HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: WASMCLOUD_HOST_ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with $top.Values.runtime.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- /* Optional envFrom (chart-wide runtime.envFrom + per-host-group). */}}
          {{- if or $top.Values.runtime.envFrom .envFrom }}
          envFrom:
            {{- with $top.Values.runtime.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          args:
            {{- if .logLevel }}
            - "--log-level={{ .logLevel }}"
            {{- end }}
            - "host"
            - "--host-name=$(WASMCLOUD_HOST_IP)"
            - "--host-group={{ .name }}"
            - "--environment=$(WASMCLOUD_HOST_ENVIRONMENT)"
            - "--scheduler-nats-url={{ include "runtime-operator.schedulerNatsUrl" (dict "ctx" $top "group" .) }}"
            {{- if $top.Values.global.tls.enabled }}
            - "--scheduler-nats-tls-ca=/runtime-cert/ca.crt"
            - "--scheduler-nats-tls-cert=/runtime-cert/tls.crt"
            - "--scheduler-nats-tls-key=/runtime-cert/tls.key"
            {{- end }}
            - "--data-nats-url={{ include "runtime-operator.dataNatsUrl" (dict "ctx" $top "group" .) }}"
            {{- if $top.Values.global.tls.enabled }}
            - "--data-nats-tls-ca=/data-cert/ca.crt"
            - "--data-nats-tls-cert=/data-cert/tls.crt"
            - "--data-nats-tls-key=/data-cert/tls.key"
            {{- end }}
            - "--oci-cache-dir=/oci-cache"
            {{- if and (.http) (.http.enabled) }}
            - "--http-addr=0.0.0.0:{{ .http.port }}"
            {{- if and ($top.Values.global.tls.enabled) (.http.tls) (.http.tls.enabled) }}
            - "--tls-cert-path=/tls-cert/tls.crt"
            - "--tls-key-path=/tls-cert/tls.key"
            {{- end }}
            {{- end }}
            {{- if and (.webgpu) (.webgpu.enabled) }}
            - "--wasi-webgpu"
            {{- end }}
            {{- range .wasmProposals }}
            - "--wasm-proposal={{ . }}"
            {{- end }}
            {{- /* Host component plugins: one --host-plugin flag per entry, each
                   rendered into the CLI's `key=value` grammar. */}}
            {{- range .hostPlugins }}
            - "--host-plugin=id={{ .id }}{{ if .image }},image={{ .image }}{{ if .pullPolicy }},pull={{ .pullPolicy }}{{ end }}{{ if .digest }},digest={{ .digest }}{{ end }}{{ else if .file }},file={{ .file }}{{ end }}{{ if .maxRestarts }},max-restarts={{ .maxRestarts }}{{ end }}"
            {{- end }}
            {{- /* Chart-wide runtime.extraArgs applies to every host group; per-host-group
                   .extraArgs is appended after it. */}}
            {{- with $top.Values.runtime.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          imagePullPolicy: {{ $top.Values.runtime.image.pull_policy }}
          volumeMounts:
            - name: oci-cache
              mountPath: /oci-cache
            - name: tmp
              mountPath: /tmp
            {{- if $top.Values.global.tls.enabled }}
            - name: runtime-cert
              mountPath: /runtime-cert
              readOnly: true
            - name: data-cert
              mountPath: /data-cert
              readOnly: true
            {{- if and (.http) (.http.enabled) (.http.tls) (.http.tls.enabled) }}
            - name: tls-cert
              mountPath: /tls-cert
              readOnly: true
            {{- end }}
            {{- end }}
            {{- /* Optional host-container volumeMounts (pair with .volumes
                   above). Rendered unconditionally so a TLS-off install still
                   mounts user volumes. */}}
            {{- with .volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with (.resources | default $top.Values.runtime.resources) }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- if and (.http) (.http.enabled) }}
            - name: http
              containerPort: {{ .http.port }}
              protocol: TCP
            {{- end }}
            {{- /* Optional additional container ports (e.g. metrics scrape).
                   Do NOT re-list the http port — the chart renders it from
                   `.http.port` above; a duplicate containerPort fails
                   Deployment validation. */}}
            {{- with .ports }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if and (.http) (.http.enabled) }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          securityContext:
            {{- toYaml $top.Values.runtime.securityContext | nindent 12 }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 0
---
{{- end }}
