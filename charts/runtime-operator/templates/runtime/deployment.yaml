{{- $registry := .Values.runtime.image.registry | default .Values.global.image.registry -}}
{{- $top := . }}
{{- range .Values.runtime.hostGroups }}
{{- $ns := default $top.Release.Namespace .namespace }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostgroup-{{ .name }}
  namespace: {{ $ns }}
  labels:
    wasmcloud.com/name: hostgroup
    wasmcloud.com/hostgroup: {{ .name }}
    {{- include "runtime-operator.labels" $top | nindent 4 }}
spec:
  replicas: {{ .replicas }}
  selector:
    matchLabels:
      wasmcloud.com/name: hostgroup
      wasmcloud.com/hostgroup: {{ .name }}
  template:
    metadata:
      labels:
        wasmcloud.com/name: hostgroup
        wasmcloud.com/hostgroup: {{ .name }}
        {{- include "runtime.podLabels" $top | nindent 8 }}
      {{- with $top.Values.runtime.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      volumes:
        - name: oci-cache
          emptyDir: {}
        {{- if $top.Values.global.tls.enabled }}
        - name: runtime-cert
          secret:
            secretName: {{ $top.Values.global.certificates.runtimeCertSecretName }}
        - name: data-cert
          secret:
            secretName: {{ $top.Values.global.certificates.dataCertSecretName }}
        {{- if and (.http) (.http.enabled) (.http.tls) (.http.tls.enabled) }}
        - name: tls-cert
          secret:
            secretName: {{ if and (.http.tls.certificate) (.http.tls.certificate.secretName) }}{{ .http.tls.certificate.secretName }}{{ else }}hostgroup-{{ .name }}-http-tls{{ end }}
        {{- end }}
        {{- end }}
      serviceAccountName: {{ include "runtime.serviceAccountName" $top }}
      {{- include "runtime-operator.imagePullSecrets" $top | nindent 6 }}
      containers:
        - name: host
          image: {{ if $registry }}{{ printf "%s/%s" $registry $top.Values.runtime.image.repository }}{{ else }}{{ $top.Values.runtime.image.repository }}{{ end }}:{{ $top.Values.runtime.image.tag | default $top.Chart.AppVersion }}
          env:
            - name: WASMCLOUD_HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: WASMCLOUD_HOST_ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if and (.otel) (.otel.enabled) }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .otel.endpoint }}
            {{- end }}
          args:
            {{- if .logLevel }}
            - "--log-level={{ .logLevel }}"
            {{- end }}
            - "host"
            - "--host-name=$(WASMCLOUD_HOST_IP)"
            - "--host-group={{ .name }}"
            - "--environment=$(WASMCLOUD_HOST_ENVIRONMENT)"
            - "--scheduler-nats-url=nats://nats.{{ $top.Release.Namespace }}.svc.cluster.local:4222"
            {{- if $top.Values.global.tls.enabled }}
            - "--scheduler-nats-tls-ca=/runtime-cert/ca.crt"
            - "--scheduler-nats-tls-cert=/runtime-cert/tls.crt"
            - "--scheduler-nats-tls-key=/runtime-cert/tls.key"
            {{- end }}
            - "--data-nats-url=nats://nats.{{ $top.Release.Namespace }}.svc.cluster.local:4222"
            {{- if $top.Values.global.tls.enabled }}
            - "--data-nats-tls-ca=/data-cert/ca.crt"
            - "--data-nats-tls-cert=/data-cert/tls.crt"
            - "--data-nats-tls-key=/data-cert/tls.key"
            {{- end }}
            - "--oci-cache-dir=/oci-cache"
            {{- if and (.http) (.http.enabled) }}
            - "--http-addr=0.0.0.0:{{ .http.port }}"
            {{- if and ($top.Values.global.tls.enabled) (.http.tls) (.http.tls.enabled) }}
            - "--tls-cert-path=/tls-cert/tls.crt"
            - "--tls-key-path=/tls-cert/tls.key"
            {{- end }}
            {{- end }}
            {{- if and (.webgpu) (.webgpu.enabled) }}
            - "--wasi-webgpu"
            {{- end }}
            {{- if and (.wasip3) (.wasip3.enabled) }}
            - "--wasip3"
            {{- end }}
            {{- if and (.otel) (.otel.enabled) }}
            - "--wasi-otel"
            {{- end }}
          imagePullPolicy: {{ $top.Values.runtime.image.pull_policy }}
          volumeMounts:
            - name: oci-cache
              mountPath: /oci-cache
            {{- if $top.Values.global.tls.enabled }}
            - name: runtime-cert
              mountPath: /runtime-cert
              readOnly: true
            - name: data-cert
              mountPath: /data-cert
              readOnly: true
            {{- if and (.http) (.http.enabled) (.http.tls) (.http.tls.enabled) }}
            - name: tls-cert
              mountPath: /tls-cert
              readOnly: true
            {{- end }}
            {{- end }}
          {{- with .resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- if and (.http) (.http.enabled) }}
            - name: http
              containerPort: {{ .http.port }}
              protocol: TCP
            {{- end }}
          securityContext:
            capabilities:
              drop:
                - NET_RAW
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 0
---
{{- end }}
