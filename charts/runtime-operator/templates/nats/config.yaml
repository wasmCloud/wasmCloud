{{- if .Values.nats.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats
  namespace: {{ .Release.Namespace }}
  labels:
    wasmcloud.com/name: nats
    {{- include "runtime-operator.labels" . | nindent 4 }}
data:
  nats-server.conf: |
    port: 4222
    jetstream {
      # Writable emptyDir (see nats/deployment.yaml) so JetStream works under a
      # read-only root filesystem.
      store_dir: "/data/jetstream"
    }

    {{- if $.Values.global.tls.enabled }}
    tls {
      cert_file: /nats-cert/tls.crt
      key_file: /nats-cert/tls.key
      ca_file: /nats-cert/ca.crt
      verify_and_map: true
    }

    authorization {
      users = [
        { user: "wasmcloud-operator" },
        { user: "wasmcloud-runtime" },
        { user: "wasmcloud-data" }
      ]
    }
    {{- end }}
{{- end }}