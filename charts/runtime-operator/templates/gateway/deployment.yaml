{{- if .Values.gateway.enabled -}}
{{- $registry := .Values.gateway.image.registry | default .Values.global.image.registry -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    wasmcloud.com/name: runtime-gateway
    {{- include "runtime-operator.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      wasmcloud.com/name: runtime-gateway
  template:
    metadata:
      labels:
        wasmcloud.com/name: runtime-gateway
        {{- include "runtime-operator.labels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: {{ .Values.gateway.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.gateway.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "gateway.serviceAccountName" . }}
      {{- include "runtime-operator.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: runtime-gateway
          image: {{ if $registry }}{{ printf "%s/%s" $registry .Values.gateway.image.repository }}{{ else }}{{ .Values.gateway.image.repository }}{{ end }}:{{ .Values.gateway.image.tag | default .Chart.AppVersion }}
          args:
            - "-bind-addr=0.0.0.0:8000"
            {{- with .Values.gateway.fallbackEndpoint }}
            - "-fallback-endpoint={{ . }}"
            {{- end }}
          imagePullPolicy: {{ .Values.gateway.image.pull_policy }}
          ports:
            - name: http
              containerPort: 8000
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.gateway.securityContext | nindent 12 }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 0
{{- end }}