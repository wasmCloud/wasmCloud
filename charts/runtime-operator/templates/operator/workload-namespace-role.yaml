{{- if and .Values.operator.enabled .Values.operator.serviceAccount.create .Values.operator.watchNamespaces -}}
# When operator.watchNamespaces is set, the operator only ever reads
# configmaps/secrets/services and records events in those namespaces — every
# Get on these resources is keyed by the workload's own namespace, and the
# informer cache is scoped via cacheOpts.DefaultNamespaces. These permissions
# are granted with a namespaced Role + RoleBinding per watched namespace (rather
# than a ClusterRole) so that installing in watchNamespaces mode requires no
# cluster-scoped RBAC. When watchNamespaces is empty (watch all namespaces),
# these rules live on the main ClusterRole instead.
{{- range .Values.operator.watchNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "runtime-operator.fullname" $ }}-workload-namespace
  namespace: {{ . }}
  labels:
    {{- include "runtime-operator.labels" $ | nindent 4 }}
rules:
  - apiGroups:
    - ""
    resources:
    - configmaps
    - secrets
    verbs:
    - get
    - list
    - watch
  - apiGroups:
    - ""
    resources:
    - events
    verbs:
    - create
    - get
    - list
    - patch
    - update
    - watch
  - apiGroups:
    - ""
    resources:
    - services
    verbs:
    - get
    - list
    - watch
  # The route controller stamps EndpointSlices with a Service ownerRef +
  # blockOwnerDeletion=true, so the GC admission plugin requires `update`
  # on services/finalizers.
  - apiGroups:
    - ""
    resources:
    - services/finalizers
    verbs:
    - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "runtime-operator.fullname" $ }}-workload-namespace
  namespace: {{ . }}
  labels:
    {{- include "runtime-operator.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "runtime-operator.fullname" $ }}-workload-namespace
subjects:
  - kind: ServiceAccount
    name: {{ include "operator.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
