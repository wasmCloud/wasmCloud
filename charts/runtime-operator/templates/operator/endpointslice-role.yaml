{{- if and .Values.operator.enabled .Values.operator.serviceAccount.create .Values.operator.watchNamespaces -}}
# The EndpointSlice controller only needs access within the watched namespaces.
# These permissions are granted with a namespaced Role + RoleBinding per watched
# namespace (rather than a ClusterRole) so that installing in watchNamespaces mode
# requires no cluster-scoped RBAC. When watchNamespaces is empty (watch all
# namespaces), the main ClusterRole covers endpointslices instead.
{{- range .Values.operator.watchNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "runtime-operator.fullname" $ }}-endpointslice
  namespace: {{ . }}
  labels:
    {{- include "runtime-operator.labels" $ | nindent 4 }}
rules:
  - apiGroups:
    - discovery.k8s.io
    resources:
    - endpointslices
    verbs:
    - create
    - delete
    - get
    - list
    - patch
    - update
    - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "runtime-operator.fullname" $ }}-endpointslice
  namespace: {{ . }}
  labels:
    {{- include "runtime-operator.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "runtime-operator.fullname" $ }}-endpointslice
subjects:
  - kind: ServiceAccount
    name: {{ include "operator.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
