{{- if and .Values.operator.enabled .Values.operator.serviceAccount.create (not .Values.operator.watchNamespaces) -}}
# This ClusterRole is only rendered when operator.watchNamespaces is empty, i.e.
# the operator watches all namespaces and every grant below is cluster-wide.
# When watchNamespaces is set, this ClusterRole (and its ClusterRoleBinding) is
# omitted entirely and the equivalent permissions are bound per-namespace via
# Roles/RoleBindings — see workload-crd-role.yaml (runtime.wasmcloud.dev CRDs),
# workload-namespace-role.yaml (configmaps/secrets/services/events), and
# endpointslice-role.yaml (endpointslices).
# See https://wasmcloud.com/docs/kubernetes-operator/operator-manual/roles-and-rolebindings/#restricting-access-of-the-operator-to-namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "runtime-operator.fullname" . }}
  labels:
    {{- include "runtime-operator.labels" . | nindent 4 }}
  annotations: {}
rules:
  # Host CRD rules are NOT in this ClusterRole. Every Host object lives in
  # the operator's own namespace, so Host CRUD is granted via the namespaced
  # Role in role.yaml.
  - apiGroups:
    - runtime.wasmcloud.dev
    resources:
    - artifacts
    - workloads
    - workloadreplicasets
    - workloaddeployments
    verbs:
    - create
    - delete
    - get
    - list
    - patch
    - update
    - watch
  - apiGroups:
    - runtime.wasmcloud.dev
    resources:
    - artifacts/status
    - workloads/status
    - workloadreplicasets/status
    - workloaddeployments/status
    verbs:
    - get
    - update
    - patch
  # Required so the operator can stamp ownerReferences with blockOwnerDeletion=true
  # on child objects — the GC admission plugin checks `update` on <owner>/finalizers.
  - apiGroups:
    - runtime.wasmcloud.dev
    resources:
    - artifacts/finalizers
    - workloads/finalizers
    - workloadreplicasets/finalizers
    - workloaddeployments/finalizers
    verbs:
    - update
  - apiGroups:
    - ""
    resources:
    - configmaps
    - secrets
    verbs:
    - get
    - list
    - watch
  - apiGroups:
    - ""
    resources:
    - events
    verbs:
    - create
    - get
    - list
    - patch
    - update
    - watch
  - apiGroups:
    - ""
    resources:
    - services
    verbs:
    - get
    - list
    - watch
  # The route controller stamps EndpointSlices with a Service ownerRef +
  # blockOwnerDeletion=true, so the GC admission plugin requires `update`
  # on services/finalizers.
  - apiGroups:
    - ""
    resources:
    - services/finalizers
    verbs:
    - update
  - apiGroups:
    - discovery.k8s.io
    resources:
    - endpointslices
    verbs:
    - create
    - delete
    - get
    - list
    - patch
    - update
    - watch
{{- end }}
