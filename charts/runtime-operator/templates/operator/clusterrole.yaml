{{- if and .Values.operator.enabled .Values.operator.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "runtime-operator.fullname" . }}
  labels:
    {{- include "runtime-operator.labels" . | nindent 4 }}
  annotations: {}
rules:
  # Host CRD rules are NOT in this ClusterRole. Every Host object lives in
  # the operator's own namespace, so Host CRUD is granted via the namespaced
  # Role in role.yaml.
  - apiGroups:
    - runtime.wasmcloud.dev
    resources:
    - artifacts
    - workloads
    - workloadreplicasets
    - workloaddeployments
    verbs:
    - create
    - delete
    - get
    - list
    - patch
    - update
    - watch
  - apiGroups:
    - runtime.wasmcloud.dev
    resources:
    - artifacts/status
    - workloads/status
    - workloadreplicasets/status
    - workloaddeployments/status
    verbs:
    - get
    - update
    - patch
  # Synced from runtime-operator/config/rbac/role.yaml (generated by controller-gen
  # from +kubebuilder:rbac annotations in the controllers). Required so the
  # operator can stamp ownerReferences with blockOwnerDeletion=true on child
  # objects — the GC admission plugin checks `update` on <owner>/finalizers.
  - apiGroups:
    - runtime.wasmcloud.dev
    resources:
    - artifacts/finalizers
    - workloads/finalizers
    - workloadreplicasets/finalizers
    - workloaddeployments/finalizers
    verbs:
    - update
  {{- if not .Values.operator.watchNamespaces }}
  # When operator.watchNamespaces is empty the operator watches all namespaces, so
  # configmaps/secrets/services/events and endpointslices are granted cluster-wide.
  # When watchNamespaces is set, these grants move to a per-namespace ClusterRole +
  # RoleBindings (see workload-namespace-role.yaml and endpointslice-role.yaml).
  # See https://wasmcloud.com/docs/kubernetes-operator/operator-manual/roles-and-rolebindings/#restricting-access-of-the-operator-to-namespaces
  - apiGroups:
    - ""
    resources:
    - configmaps
    - secrets
    verbs:
    - get
    - list
    - watch
  - apiGroups:
    - ""
    resources:
    - events
    verbs:
    - create
    - get
    - list
    - patch
    - update
    - watch
  - apiGroups:
    - ""
    resources:
    - services
    verbs:
    - get
    - list
    - watch
  - apiGroups:
    - discovery.k8s.io
    resources:
    - endpointslices
    verbs:
    - create
    - delete
    - get
    - list
    - patch
    - update
    - watch
  {{- end }}
{{- end }}
