{{- if and .Values.operator.enabled .Values.operator.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "runtime-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runtime-operator.labels" . | nindent 4 }}
  annotations: {}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch", "watch"]
  # Host CRDs always live in the operator's own namespace, so Host
  # CRUD is granted via this namespaced Role rather than a ClusterRole.
  - apiGroups: ["runtime.wasmcloud.dev"]
    resources: ["hosts", "hosts/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["runtime.wasmcloud.dev"]
    resources: ["hosts/status"]
    verbs: ["get", "update", "patch"]
{{- end }}
