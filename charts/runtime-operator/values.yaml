global:
  image:
    # -- Globally override container image registry, e.g. "ghcr.io"
    registry: ""
    # -- Globally override container imagePullSecrets
    pullSecrets: []
  nameOverride: ""
  fullnameOverride: ""
  nats:
    # -- Control-plane / scheduler NATS URL. Used by the operator (`-nats-url`)
    # and the host runtime (`--scheduler-nats-url`) so both connect to the same
    # control plane. When empty, defaults to the in-cluster NATS service:
    # `nats://nats.<release-namespace>.svc.cluster.local:4222`. Override to point
    # at an external NATS cluster, a different service name/port, or NATS in
    # another namespace. Can be overridden per host group via
    # `runtime.hostGroups[].schedulerNatsUrl`.
    schedulerUrl: ""
    # -- Data-plane NATS URL. Used by the host runtime (`--data-nats-url`) for
    # Wasm workload messaging, allowing workloads to use a separate NATS cluster
    # from the control plane. When empty, defaults to the same in-cluster NATS
    # service as `schedulerUrl`. Can be overridden per host group via
    # `runtime.hostGroups[].dataNatsUrl`.
    dataUrl: ""
  tls:
    # -- Enable TLS for NATS connections and certificate generation.
    # Set to false when a service mesh (e.g. Istio) provides mTLS.
    enabled: true
  certificates:
    # -- Enable automatic generation of self-signed TLS certificates for the operator and runtime hosts.
    # Ignored when global.tls.enabled is false.
    generate: true
    # -- Name of the Kubernetes Secrets holding the Private CA certificate ( NATS )
    caSecretName: wasmcloud-ca
    # -- Name of the Kubernetes Secret holding the TLS server certificate for the NATS server (if enabled in this chart)
    natsCertSecretName: wasmcloud-nats-tls
    # -- Name of the Kubernetes Secret holding the TLS client certificate the operator presents to NATS
    operatorCertSecretName: wasmcloud-operator-tls
    # -- Name of the Kubernetes Secret holding the TLS client certificate host pods present to the scheduler NATS connection
    runtimeCertSecretName: wasmcloud-runtime-tls
    # -- Name of the Kubernetes Secret holding the TLS client certificate host pods present to the data NATS connection
    dataCertSecretName: wasmcloud-data-tls

# -- Values for installing a basic NATS Server with Ephemeral Storage. If you prefer to install NATS separately, set `enabled` to `false`.
nats:
  enabled: true
  # -- Labels to add to the NATS pod template
  podLabels: {}
  # -- Annotations to add to the NATS pod template
  podAnnotations: {}
  image:
    registry: docker.io
    repository: nats
    pull_policy: Always
    tag: "2.12.8-alpine"
  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Name of the service account to use. If not set and create is true, a name is generated using the fullname template. If not set and create is false, "default" is used.
    name: ""
    # -- Annotations to add to the service account
    annotations: {}

operator:
  enabled: true
  # -- Labels to add to the operator pod template
  podLabels: {}
  # -- Annotations to add to the operator pod template
  podAnnotations: {}
  image:
    registry: ghcr.io
    repository: wasmcloud/runtime-operator
    pull_policy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
  service:
    type: ClusterIP
    port: 8443
  # -- This section builds out the service account.
  # See the [Kubernetes documentation](https://kubernetes.io/docs/concepts/security/service-accounts/).
  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Name of the service account to use. If not set and create is true, a name is generated using the fullname template. If not set and create is false, "default" is used.
    name: ""
    # -- Annotations to add to the service account
    annotations: {}
  # -- List of namespaces to watch. If empty, the operator watches all namespaces.
  watchNamespaces: []
  # -- List of namespaces where host Pods run. The operator's Pod
  # informer cache and per-namespace Pod RBAC cover this set so
  # HostPodReconciler can manage finalizers on host Pods.
  # Leave empty when host Pods only run in the operator's own namespace (the
  # chart's default deployment topology).
  hostNamespaces: []
  # -- Allow WorkloadDeployments to schedule onto Hosts whose Environment
  # differs from the WorkloadDeployment's own namespace, via
  # spec.template.spec.environment. The default (true) preserves existing
  # behavior where workloads with no `environment` set may schedule onto any
  # matching host regardless of which tenant namespace the host runs in.
  #
  # SECURITY: This default is permissive across tenants. In a multi-tenant
  # cluster where each tenant has its own namespace and host pods, a
  # tenant in `namespace-a` can target hosts in `namespace-b` simply by
  # setting `spec.template.spec.environment: namespace-b`. If your install
  # relies on namespace boundaries for tenant isolation, set this to
  # `false`: scheduling will then be locked to the workload's own
  # namespace, and any cross-tenant `environment` is rejected with a
  # `CrossEnvironmentSchedulingDenied` Warning Event and a
  # `HostSelection=False` condition on the Workload.
  allowSharedHosts: true
  # -- Additional environment variables for the operator container, appended
  # after the chart-managed vars. Standard Kubernetes env shape (supports
  # `valueFrom` secretKeyRef / configMapKeyRef).
  # Example:
  #   env:
  #     - name: LOG_LEVEL
  #       value: debug
  env: []
  # -- Populate the operator container's environment from ConfigMaps/Secrets.
  # Standard Kubernetes `envFrom` shape.
  # Example:
  #   envFrom:
  #     - secretRef:
  #         name: operator-extra-config
  envFrom: []
  # -- Additional CLI args appended verbatim to the operator container, for
  # operator flags the chart does not template (e.g. `-leader-elect`,
  # `-cpu-backpressure-threshold=75`).
  # Example:
  #   extraArgs:
  #     - "-leader-elect"
  extraArgs: []

gateway:
  # -- DEPRECATED: runtime-gateway is being removed. HTTP routing is now handled
  # by the runtime-operator via EndpointSlices.
  # Set kubernetetes.service.name in your WorkloadDeployment spec to enable automatic
  # EndpointSlice management. To disable installing the runtime-gateway, set `enabled` to `false`.
  enabled: true
  # -- Fallback endpoint when no workloads are available. Example: "http://notfound.svc.cluster.local"
  fallbackEndpoint: ""
  image:
    registry: ghcr.io
    repository: wasmcloud/runtime-gateway
    pull_policy: Always
  service:
    type: ClusterIP
    port: 80
    # -- Only used if service type is NodePort
    nodePort: null
  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Name of the service account to use. If not set and create is true, a name is generated using the fullname template. If not set and create is false, "default" is used.
    name: ""
    # -- Annotations to add to the service account
    annotations: {}

runtime:
  # -- Labels to add to runtime host pod templates
  podLabels: {}
  # -- Annotations to add to runtime host pod templates
  podAnnotations: {}
  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Name of the service account to use. If not set and create is true, a name is generated using the fullname template. If not set and create is false, "default" is used.
    name: ""
    # -- Annotations to add to the service account
    annotations: {}
  image:
    registry: ghcr.io
    repository: wasmcloud/wash
    pull_policy: Always
    tag: ""
  # -- Additional environment variables applied to every host group container,
  # appended after the chart-managed vars and before any per-host-group `env`.
  # Standard Kubernetes env shape (supports `valueFrom`).
  env: []
  # -- Populate every host group container's environment from
  # ConfigMaps/Secrets. Merged with per-host-group `envFrom`. Standard
  # Kubernetes `envFrom` shape.
  envFrom: []
  # -- Additional CLI args appended to every host group container, for host
  # flags the chart does not template. Merged with per-host-group `extraArgs`.
  extraArgs: []
  hostGroups:
    - name: default
      # -- Namespace to deploy this host group's Deployment, Service, generated
      # TLS Secret, and ServiceAccount into. Empty (default) deploys to the
      # chart release's namespace. When overridden, ensure the namespace
      # exists and is included in `operator.hostNamespaces` so the operator
      # has Pod RBAC + cache access to manage host Pod lifecycle there.
      namespace: ""
      replicas: 1
      # -- Per-host-group override of the scheduler NATS URL. Empty falls back to
      # `global.nats.schedulerUrl`, then the in-cluster NATS service.
      schedulerNatsUrl: ""
      # -- Per-host-group override of the data NATS URL. Empty falls back to
      # `global.nats.dataUrl`, then the in-cluster NATS service.
      dataNatsUrl: ""
      # -- Per-host-group environment variables, appended after `runtime.env`.
      # Standard Kubernetes env shape (supports `valueFrom`).
      env: []
      # -- Per-host-group `envFrom`, merged with `runtime.envFrom`.
      envFrom: []
      # -- Per-host-group extra CLI args, appended after `runtime.extraArgs`.
      extraArgs: []
      service:
        type: ClusterIP
      webgpu:
        enabled: false
      wasip3:
        enabled: false
      http:
        enabled: true
        port: 9191
        tls:
          # -- Enable TLS for the HTTP server. Requires global.tls.enabled to be true.
          # When enabled, a certificate is generated (if global.certificates.generate is true)
          # and the host serves HTTPS instead of HTTP.
          enabled: false
          certificate:
            # -- Name of the Kubernetes Secret holding the TLS server certificate for this host group. Ignored if global.certificates.generate is true.
            secretName: ""
            generate:
              # -- Whether to generate a self-signed TLS certificate for this host group. Ignored if global.certificates.generate is false or if certificate.secretName is set.
              enabled: false
              # -- Validity period (in days) for the generated TLS certificate. Ignored if global.certificates.generate is false.
              validity: 365
              # -- Common Name (CN) for the generated TLS certificate.
              commonName: ""
              # -- List of DNS Subject Alternative Names (SANs) for the generated TLS certificate.
              # Example: ["myapp.example.com", "myapp.default.svc.cluster.local"]
              domains: []
      resources:
        requests:
          memory: "64Mi"
          cpu: "250m" # 0.25 CPU cores
        limits:
          memory: "512Mi"
          cpu: "500m" # 0.5 CPU cores
