name: charts
on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            relevant:
              - 'charts/**'
              - '.github/workflows/charts.yml'

  test:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go
      - name: Render
        run: make helm-render

  # Fails a PR that changes any file under a chart without bumping that chart's
  # Chart.yaml `version`. Also runs `helm lint` + yamllint on the chart.
  lint:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    name: ct lint (chart version bump)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # ct diffs the chart against `target-branch` to decide whether the
          # version was bumped, so it needs full history, not a shallow clone.
          fetch-depth: 0
          persist-credentials: false
      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
      - name: Lint charts and enforce version bump
        run: ct lint --config .github/ct.yaml

  # Schema-validates the rendered manifests against the Kubernetes API.
  kubeconform:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    name: kubeconform (manifest schema)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go
      - name: Install kubeconform
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@v0.6.7
      - name: Validate rendered manifests
        # -ignore-missing-schemas skips kinds with no published schema (CRDs such
        # as runtime.wasmcloud.dev and cert-manager Certificate); everything with
        # a known schema is validated strictly.
        run: |
          helm template -n example-ns example-name charts/runtime-operator \
            | kubeconform -strict -summary -ignore-missing-schemas \
                -kubernetes-version 1.30.0 -schema-location default

  # Security / best-practice scanners, blocking via `gate` below.
  trivy:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    name: trivy config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: charts/runtime-operator
          severity: HIGH,CRITICAL
          trivyignores: charts/runtime-operator/.trivyignore
          exit-code: '1'

  checkov:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    name: checkov
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff # v12.3107.0
        with:
          directory: charts/runtime-operator
          framework: helm
          config_file: charts/runtime-operator/.checkov.yaml
          output_format: cli
          soft_fail: false

  gate:
    needs:
      - test
      - lint
      - kubeconform
      - trivy
      - checkov
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs to pass or be skipped
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            exit 1
          fi

  canary:
    # `always()` is required to break the skipped-`changes` propagation
    # that otherwise marks this job skipped even when `test` succeeded.
    # Original intent (main push or PR with `canary` label) preserved as
    # the second clause; per-need success gate restores the implicit
    # success() check that `always()` disables.
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'canary')) &&
      needs.test.result == 'success'
    needs:
      - test
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/helm-publish
        with:
          chart-name: runtime-operator
          chart-version: v2-canary
          chart-app-version: canary
          registry: ghcr.io
          registry-username: ${{ github.repository_owner }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          registry-namespace: wasmcloud/charts

  release:
    # Same skipped-`changes` propagation footgun: on a tag push, `changes`
    # is skipped (only fires on PR), and without `always()` GHA marks
    # this skipped even when `test` succeeded. That would silently break
    # the chart release on every `vX.Y.Z` tag push.
    if: always() && startsWith(github.ref, 'refs/tags/v') && needs.test.result == 'success'
    needs:
      - test
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/helm-publish
        with:
          chart-name: runtime-operator
          registry: ghcr.io
          registry-username: ${{ github.repository_owner }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          registry-namespace: wasmcloud/charts
