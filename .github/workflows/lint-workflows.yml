name: lint-workflows
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'

permissions: {}

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            relevant:
              - '.github/workflows/**'
              - '.github/actions/**'

  actionlint:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "^1.26.0"
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Run actionlint
        run: actionlint -color

  zizmor:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required: the action uploads its findings as SARIF to the GitHub
      # Code Scanning API. Without this, the upload step errors with
      # "Resource not accessible by integration" and fails the job.
      # Fork PRs auto-restrict the token to read-only; the action handles
      # that internally and skips the upload rather than failing.
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        env:
          # Used by zizmor for online audits (e.g. checking whether a
          # referenced action's tag still resolves to its pinned SHA).
          GH_TOKEN: ${{ github.token }}

  gate:
    needs:
      - actionlint
      - zizmor
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Require all jobs to pass or be skipped
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            exit 1
          fi
