name: wit-tools-bump

# Opens a PR when bytecodealliance/wasm-tools or bytecodealliance/wasm-pkg-tools
# (wkg) publishes a new stable GitHub release. The pinned versions live in
# wit.yml's top-level `env:` block.
#
# Why this exists: Dependabot's `github-actions` ecosystem tracks `uses:`
# refs (the action SHA), not arbitrary `with:` inputs or versions fetched
# at runtime. wasm-tools (installed via bytecodealliance/actions/wasm-tools/setup)
# and wkg (downloaded by the validate job at its pinned version) are therefore
# invisible to Dependabot, so we maintain them with a small custom updater.
#
# wash is installed via wasmcloud/setup-wash-action (which defaults to
# the latest wash release) and is not tracked here.
#
# Caveat: PRs opened by GITHUB_TOKEN do not trigger downstream workflow
# runs (GitHub's recursion guard), so `wit.yml` won't auto-run on the
# bump PR. Close-and-reopen the PR (or push an empty commit) to validate.
# To remove that step, swap GITHUB_TOKEN here for a PAT or GitHub App
# token stored as a repo secret.

on:
  schedule:
    # Monday 14:00 UTC.
    - cron: '0 14 * * 1'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve latest tool versions and apply bumps
        id: update
        env:
          GH_TOKEN: ${{ github.token }}
        run: node .github/scripts/bump-wit-tools.mjs

      - name: Open / update PR
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: bump/wit-tools
          delete-branch: true
          title: 'ci(wit): bump pinned wit tool versions'
          commit-message: |
            ci(wit): bump pinned wit tool versions

            ${{ steps.update.outputs.body }}
          labels: |
            dependencies
            github-actions
          body: |
            Bumps the wit pipeline's pinned tool versions (wasm-tools, wkg) to upstream's latest stable releases.

            ${{ steps.update.outputs.body }}

            > [!NOTE]
            > GitHub doesn't trigger downstream workflows for PRs opened by `GITHUB_TOKEN`,
            > so `wit.yml` will not auto-run here. Close-and-reopen this PR (or push
            > an empty commit) to validate.
