name: examples

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      blobby: ${{ steps.filter.outputs.blobby }}
      grpc-hello-world: ${{ steps.filter.outputs.grpc-hello-world }}
      otel-http: ${{ steps.filter.outputs.otel-http }}
      qrcode: ${{ steps.filter.outputs.qrcode }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            blobby:
              - 'examples/blobby/**'
              - '.github/actions/build-rust-example/**'
              - '.github/actions/setup-rust-example/**'
              - '.github/workflows/examples.yml'
            grpc-hello-world:
              - 'examples/grpc-hello-world/**'
              - '.github/actions/build-rust-example/**'
              - '.github/actions/setup-rust-example/**'
              - '.github/workflows/examples.yml'
            otel-http:
              - 'examples/otel-http/**'
              - '.github/actions/build-rust-example/**'
              - '.github/actions/setup-rust-example/**'
              - '.github/workflows/examples.yml'
            qrcode:
              - 'examples/qrcode/**'
              - '.github/actions/build-rust-example/**'
              - '.github/actions/setup-rust-example/**'
              - '.github/workflows/examples.yml'

  blobby:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.blobby == 'true' || contains(github.event.pull_request.labels.*.name, 'examples-canary'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-example
      - uses: ./.github/actions/build-rust-example
        with:
          working-directory: examples/blobby
          image: ghcr.io/wasmcloud/components/blobby

  # grpc-hello-world is one Cargo workspace with two components; each has
  # its own .wash/config.yaml so we invoke build-rust-example per component.
  grpc-hello-world:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.grpc-hello-world == 'true' || contains(github.event.pull_request.labels.*.name, 'examples-canary'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-example
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "29.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/build-rust-example
        with:
          working-directory: examples/grpc-hello-world/component-client
          image: ghcr.io/wasmcloud/components/grpc-hello-world-client
      - uses: ./.github/actions/build-rust-example
        with:
          working-directory: examples/grpc-hello-world/component-server
          image: ghcr.io/wasmcloud/components/grpc-hello-world-server

  otel-http:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.otel-http == 'true' || contains(github.event.pull_request.labels.*.name, 'examples-canary'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-example
      - uses: ./.github/actions/build-rust-example
        with:
          working-directory: examples/otel-http
          image: ghcr.io/wasmcloud/components/otel-http

  qrcode:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.qrcode == 'true' || contains(github.event.pull_request.labels.*.name, 'examples-canary'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-example
      - uses: ./.github/actions/build-rust-example
        with:
          working-directory: examples/qrcode
          image: ghcr.io/wasmcloud/components/qrcode

  # Coverage check: every Rust example (directory with .wash/config.yaml
  # AND Cargo.toml) must have a CI job here, and every top-level Rust
  # example must have a README.md. Scoped to Rust because this workflow
  # is Rust-only. Cheap enough to always run.
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Verify every Rust example has a CI job
        run: |
          set -euo pipefail
          fs_examples=$(find examples -path '*/.wash/config.yaml' -print0 \
            | xargs -0 -n1 dirname \
            | xargs -n1 dirname \
            | sort -u)
          if [[ -z "${fs_examples}" ]]; then
            echo "ERROR: no examples with .wash/config.yaml found" >&2
            exit 1
          fi
          missing=()
          while IFS= read -r dir; do
            # Skip non-Rust examples — this workflow is Rust-only.
            [[ -f "${dir}/Cargo.toml" ]] || continue
            # Anchor the match so working-directory: examples/foo does not
            # falsely satisfy a check for working-directory: examples/foo/bar.
            if ! grep -qE "working-directory: ${dir}( |$)" .github/workflows/examples.yml; then
              missing+=("${dir}")
            fi
          done <<< "${fs_examples}"
          if [[ ${#missing[@]} -gt 0 ]]; then
            {
              echo "ERROR: Rust example(s) have .wash/config.yaml but no job in examples.yml:"
              printf '  %s\n' "${missing[@]}"
              echo "Add a job whose working-directory points at each path above."
            } >&2
            exit 1
          fi
          echo "All Rust examples covered."
      - name: Verify every top-level Rust example has a README.md
        run: |
          set -euo pipefail
          missing=()
          for dir in examples/*/; do
            # Skip non-Rust examples — this workflow is Rust-only.
            [[ -f "${dir}Cargo.toml" ]] || continue
            if [[ ! -f "${dir}README.md" ]]; then
              missing+=("${dir}")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            {
              echo "ERROR: Rust example(s) missing README.md:"
              printf '  %s\n' "${missing[@]}"
              echo "Every top-level Rust example must have a README.md describing what it does and how to run it."
            } >&2
            exit 1
          fi

  gate:
    needs:
      - blobby
      - grpc-hello-world
      - otel-http
      - qrcode
      - coverage
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs to pass or be skipped
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            exit 1
          fi
