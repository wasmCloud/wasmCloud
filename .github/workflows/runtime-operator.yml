name: runtime-operator
on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  GOWORK: "off"

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            relevant:
              - '.github/workflows/runtime-operator.yml'
              - 'runtime-operator/**'
              - 'proto/**'
              - 'charts/runtime-operator/**'
              - 'deploy/kind/kind-config.yaml'

  lint:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true' || contains(github.event.pull_request.labels.*.name, 'canary'))
    permissions:
      # Required: allow read access to the content for analysis.
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go
      - uses: ./.github/actions/lint-go
        with:
          working-directory: runtime-operator

  # Two related checks bundled in one job because they share the same source
  # of truth (controller-gen `+kubebuilder:rbac` annotations → config/rbac/role.yaml):
  #   1. `make manifests` produces no diff — catches annotations that were
  #      added/edited without re-running controller-gen, and annotations
  #      placed where controller-gen silently skips them.
  #   2. The Helm chart grants every (apiGroup, resource, verb) tuple in
  #      role.yaml — catches new markers landing in code without the matching
  #      chart update (the chart is hand-mapped from role.yaml).
  manifests:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true' || contains(github.event.pull_request.labels.*.name, 'canary'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.4
      - name: Regenerate manifests
        working-directory: runtime-operator
        run: make manifests
      - uses: ./.github/actions/no-diff
        with:
          path: runtime-operator
          fixup-command: "(cd runtime-operator && make manifests)"
      - name: Verify Helm chart RBAC parity with controller-gen output
        run: node .github/scripts/runtime-operator-rbac-parity.mjs

  test:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true' || contains(github.event.pull_request.labels.*.name, 'canary'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go
      - name: Build
        working-directory: runtime-operator
        run: make build
      - name: Test
        working-directory: runtime-operator
        run: make test

  build:
    needs:
      - lint
      - test
    # `lint`/`test` use `if: always() && (changes.skipped || ...)` so they
    # run on main pushes where `changes` is skipped. Without `always()`
    # here, GHA propagates `changes`'s skipped state through the chain and
    # marks `build` skipped even when lint/test both succeeded — which
    # then cascades into `test-e2e` and `canary`. Explicit per-need
    # success gates are the documented workaround.
    if: always() && needs.lint.result == 'success' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build operator image
        working-directory: runtime-operator
        run: make docker-build IMG=localhost/runtime-operator:e2e
      - name: Save operator image
        run: docker save localhost/runtime-operator:e2e -o /tmp/operator-image.tar
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: operator-image
          path: /tmp/operator-image.tar
          retention-days: 1

  test-e2e:
    needs:
      - build
    # `build` overrides default with `always()` to bypass the skipped
    # `changes` upstream; this job needs the same override so the skip
    # state from `changes` doesn't propagate further.
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operator-image
          path: /tmp
      - name: Load operator image
        run: docker load -i /tmp/operator-image.tar
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: wasmcloud-e2e
          config: deploy/kind/kind-config.yaml
      - name: Run e2e tests
        working-directory: runtime-operator
        run: make test-e2e
        env:
          SKIP_IMAGE_BUILD: "true"
          PROMETHEUS_INSTALL_SKIP: "true"
          CERT_MANAGER_INSTALL_SKIP: "true"
          KIND_CLUSTER_NAME: wasmcloud-e2e
      - name: Dump diagnostics
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n wasmcloud-system -o wide
          echo "=== Events ==="
          kubectl get events -n wasmcloud-system --sort-by=.lastTimestamp
          echo "=== Operator Logs ==="
          kubectl logs -n wasmcloud-system -l wasmcloud.com/name=runtime-operator --tail=200 || true
          echo "=== Gateway Logs ==="
          kubectl logs -n wasmcloud-system -l wasmcloud.com/name=runtime-gateway --tail=200 || true
          echo "=== Host Logs ==="
          kubectl logs -n wasmcloud-system -l wasmcloud.com/name=hostgroup --tail=200 || true
          echo "=== CRD Resources ==="
          kubectl get hosts.runtime.wasmcloud.dev -A -o yaml || true
          kubectl get workloaddeployments.runtime.wasmcloud.dev -A -o yaml || true
          kubectl get workloads.runtime.wasmcloud.dev -A -o yaml || true

  gate:
    needs:
      - lint
      - test
      - manifests
      - build
      - test-e2e
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs to pass or be skipped
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            exit 1
          fi

  # The `sha-<full-sha>` tag is what release-tag.yml pins to when promoting
  # this canary digest as the immutable vX.Y.Z release tag. `canary` itself
  # moves on every subsequent main push.
  canary:
    # `always()` is required to break the skipped-`changes` propagation
    # that otherwise marks this job skipped even when its direct needs
    # all succeed. The original intent — run on main pushes or PRs with
    # the `canary` label — is preserved as the second clause; the
    # per-need `result == 'success'` gates restore the implicit success()
    # check that `always()` disables.
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'canary')) &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      needs.test-e2e.result == 'success'
    needs:
      - lint
      - test
      - test-e2e
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/docker-build-push.yml
    with:
      working-directory: runtime-operator
      file: runtime-operator/Dockerfile
      image: ghcr.io/wasmcloud/runtime-operator
      push: true
      tags: |
        type=raw,value=canary
        type=sha,format=long,prefix=sha-
