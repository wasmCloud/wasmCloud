name: wash

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/wash.yml"
      - "crates/**"
      - "src/**"
      - "tests/**"
      - "Cargo.*"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - "runtime-operator/test/e2e/**"
      - "charts/runtime-operator/**"
      - "deploy/kind/kind-config.yaml"
  push:
    branches:
      - main
    tags:
      - "v*"

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Remove unused files
        if: ${{ matrix.os == 'ubuntu-latest' }}
        # based on https://dev.to/mathio/squeezing-disk-space-from-github-actions-runners-an-engineers-guide-3pjg
        run: |
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft /opt/google
          sudo rm -rf /opt/az
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/hostedtoolcache
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "^1.26.0"
          cache: false
      - name: Setup TinyGo
        uses: acifani/setup-tinygo@dd8a7075d951a7595b2ef2123ed0ab1af0c13e56 # v3.0.0
        with:
          tinygo-version: "0.39.0"
      - name: Setup wasm-tools
        uses: bytecodealliance/actions/wasm-tools/setup@9152e710e9f7182e4c29ad218e4f335a7b203613 # v1.1.3
        with:
          version: "1.247.0"
      - name: Setup protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "29.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      - name: Build
        run: cargo build
      - name: Test
        env:
          RUST_BACKTRACE: "1"
          OCI_INTEGRATION_TESTS: ${{ matrix.os == 'ubuntu-latest' && '1' || '' }}
          NATS_INTEGRATION_TESTS: ${{ matrix.os == 'ubuntu-latest' && '1' || '' }}
        run: |
          cargo test --workspace
      - name: Test with wasip3
        run: |
          cargo test -p wash-runtime --features wasip3

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "29.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          rust-toolchain: nightly
          rust-components: rustfmt
      - name: Install cargo-machete
        uses: taiki-e/install-action@7769b73c2ec98c38dfcf2e18c83cfd4880c038c1 # v2.75.27
        with:
          tool: cargo-machete@0.8.0
      - name: Format
        run: |
          cargo +nightly fmt -- --check
      - name: Lint
        run: |
          cargo clippy --workspace --features wasip3
      - name: Check for unused dependencies
        run: |
          cargo machete

  # Integration gate: build the wash image from this commit, install it
  # alongside the runtime-operator chart in a kind cluster, and run the
  # operator's e2e suite (including the messaging round-trip from #5074)
  # against it. The canary tag only moves if this passes. Also runs on
  # PRs that touch wash, the chart, or the e2e suite, so regressions are
  # caught before merge rather than after.
  runtime-operator-e2e:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-go
      - name: Build wash runtime image
        run: docker build -t localhost/wasmcloud-wash:e2e .
      - name: Build runtime-operator image
        working-directory: runtime-operator
        run: make docker-build IMG=localhost/runtime-operator:e2e
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: wasmcloud-e2e
          config: deploy/kind/kind-config.yaml
      - name: Run runtime-operator e2e against locally-built wash
        working-directory: runtime-operator
        run: make test-e2e
        env:
          # Operator and wash images are already built above; the suite
          # just needs to load them into kind.
          SKIP_IMAGE_BUILD: "true"
          BUILD_RUNTIME_IMAGE: "true"
          SKIP_RUNTIME_BUILD: "true"
          # Exercise the messaging spec — this is the regression test for
          # #5074 and is the whole reason the gate exists.
          MESSAGING_E2E_IMAGE: ghcr.io/wasmcloud/components/messaging-echo-rust:0.1.0
          PROMETHEUS_INSTALL_SKIP: "true"
          CERT_MANAGER_INSTALL_SKIP: "true"
          KIND_CLUSTER_NAME: wasmcloud-e2e
      - name: Dump diagnostics
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n wasmcloud-system -o wide || true
          echo "=== Events ==="
          kubectl get events -n wasmcloud-system --sort-by=.lastTimestamp || true
          echo "=== Operator Logs ==="
          kubectl logs -n wasmcloud-system -l wasmcloud.com/name=runtime-operator --tail=200 || true
          echo "=== Host Logs ==="
          kubectl logs -n wasmcloud-system -l wasmcloud.com/name=hostgroup --tail=300 || true
          echo "=== CRD Resources ==="
          kubectl get hosts.runtime.wasmcloud.dev -A -o yaml || true
          kubectl get workloaddeployments.runtime.wasmcloud.dev -A -o yaml || true
          kubectl get workloads.runtime.wasmcloud.dev -A -o yaml || true

  # The canary docker image is built in parallel with check/lint/e2e to
  # avoid serializing the slow cargo build behind the slow tests. With
  # `push: false`, the multi-arch digests are still pushed to ghcr (the
  # workflow always does that for caching), but the human-visible
  # `canary-v2` tag is *not* created here — that happens in
  # `canary-publish` below, gated on every test job passing.
  canary-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit
    with:
      push: false
      image: ghcr.io/wasmcloud/wash
      tags: |
        type=raw,value=canary-v2

  # Tag promotion: only move `canary-v2` once check, lint, and the
  # runtime-operator e2e have all passed against this commit. Reads the
  # digests uploaded by canary-build and assembles the manifest list. The
  # `sha-<full-sha>` tag is what release-tag.yml pins to when it promotes
  # this canary digest as the immutable vX.Y.Z release tag — `canary-v2`
  # itself moves on every subsequent main push, so we cannot rely on it.
  canary-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, lint, runtime-operator-e2e, canary-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ needs.canary-build.outputs.artifact_prefix }}-${{ github.run_id }}-*
          merge-multiple: true
      - name: Login to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/wasmcloud/wash
          tags: |
            type=raw,value=canary-v2
            type=sha,format=long,prefix=sha-
      - name: Create manifest list and push tags
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/wasmcloud/wash@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/wasmcloud/wash:${{ steps.meta.outputs.version }}

  # Canary matrix binary build. Runs on every release commit on main (i.e.
  # what release-train just merged) so release-tag.yml can promote the
  # exact bytes that the canary CI tested instead of rebuilding on tag.
  # Skipped for non-release main pushes to avoid burning ~7 runners on
  # every commit. Manual fallback (train offline): push a `release: vX.Y.Z`
  # commit by hand and this job fires.
  canary-binaries:
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release: v')"
    needs: [check, lint, runtime-operator-e2e]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            # Pin minimum glibc to 2.17 (RHEL 7 / CentOS 7 era) for broad
            # compatibility with mainstream distros. GPU drivers on Ubuntu,
            # Fedora, Arch, RHEL, etc. are glibc-linked, so this binary can
            # dlopen them reliably (unlike the musl build).
            buildTarget: x86_64-unknown-linux-gnu.2.17
            buildCommand: cargo zigbuild
            artifact: wash-x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            bin: wash
          - target: aarch64-unknown-linux-gnu
            buildTarget: aarch64-unknown-linux-gnu.2.17
            buildCommand: cargo zigbuild
            artifact: wash-aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            bin: wash
          - target: x86_64-unknown-linux-musl
            buildCommand: cargo zigbuild
            artifact: wash-x86_64-unknown-linux-musl
            runner: ubuntu-latest
            bin: wash
          - target: aarch64-unknown-linux-musl
            buildCommand: cargo zigbuild
            artifact: wash-aarch64-unknown-linux-musl
            runner: ubuntu-latest
            bin: wash
          - target: x86_64-apple-darwin
            buildCommand: cargo build
            artifact: wash-x86_64-apple-darwin
            runner: macos-15-intel
            bin: wash
          - target: aarch64-apple-darwin
            buildCommand: cargo build
            artifact: wash-aarch64-apple-darwin
            runner: macos-latest
            bin: wash
          - target: x86_64-pc-windows-msvc
            buildCommand: cargo build
            artifact: wash-x86_64-pc-windows-msvc
            runner: windows-latest
            bin: wash.exe
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          rust-toolchain: stable
          # Only needed for ubuntu
          install-zigbuild: ${{ matrix.runner == 'ubuntu-latest' }}
          rust-targets: "${{ matrix.target }}"

      - name: Setup protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "29.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set SOURCE_DATE_EPOCH from commit timestamp
        # Pin embedded timestamps in the binary to the merge commit's author
        # date so the same commit produces the same bytes on every rebuild.
        # cargo and rustc honor SOURCE_DATE_EPOCH for build metadata; this
        # is a prerequisite for any future move toward bit-reproducible
        # SLSA L4 builds. See https://reproducible-builds.org/docs/source-date-epoch/
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "${GITHUB_ENV}"

      - name: Build binary (${{ matrix.target }})
        run: |
          ${{ matrix.buildCommand }} --release --target ${{ matrix.buildTarget || matrix.target }}
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} ${{ matrix.artifact }}

      - name: Create Windows zip archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.bin }}" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload Windows zip artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}.zip
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error
