name: wash

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      is_release:
        description: "Treat this run as a release: run canary-binaries, gate as if Cargo.toml had bumped. Use when re-releasing a SHA whose Cargo.toml is already at the target version, or when finalizing a release whose train run failed."
        type: boolean
        default: false

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  # Drop most DWARF; keep enough for usable backtraces. Shrinks target/ by
  # several GB on this workspace (wasmtime, OTel, oci-client).
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only
  # Swatinem/rust-cache doesn't cache target/<profile>/incremental, so on CI
  # incremental artifacts are pure disk cost with no reuse.
  CARGO_INCREMENTAL: "0"

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            relevant:
              - '.github/workflows/wash.yml'
              - 'crates/**'
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'rustfmt.toml'
              - 'runtime-operator/test/e2e/**'
              - 'charts/runtime-operator/**'
              - 'deploy/kind/kind-config.yaml'

  # Detect whether this commit bumps the workspace version — the signal
  # that "this is a release." Compare `[workspace.package].version` at
  # HEAD against HEAD~1. workflow_dispatch can override via `is_release`
  # input (e.g., re-releases where Cargo.toml is already at the target
  # version, or finalizing a release whose train run failed).
  release-detect:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is_release: ${{ steps.detect.outputs.is_release }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          persist-credentials: false
      - name: Detect workspace version bump
        id: detect
        env:
          INPUT_IS_RELEASE: ${{ inputs.is_release }}
        run: |
          set -euo pipefail
          read_ws_version() {
            local src="$1"
            if [[ "${src}" == "HEAD" ]]; then
              cat Cargo.toml
            else
              git show "${src}:Cargo.toml"
            fi | awk -F'"' '
              /^\[workspace\.package\]/ { in_pkg = 1; next }
              /^\[/ && !/^\[workspace\.package\]/ { in_pkg = 0 }
              in_pkg && /^version = "/ { print $2; exit }
            '
          }
          CUR=$(read_ws_version HEAD)
          PREV=$(read_ws_version HEAD~1 2>/dev/null || true)
          if [[ "${INPUT_IS_RELEASE}" == "true" ]]; then
            echo "workflow_dispatch with is_release=true — treating as release"
            echo "is_release=true" >> "${GITHUB_OUTPUT}"
            echo "version=${CUR}" >> "${GITHUB_OUTPUT}"
          elif [[ -n "${CUR}" && "${CUR}" != "${PREV}" ]]; then
            echo "version bump detected: ${PREV:-<none>} → ${CUR}"
            echo "is_release=true" >> "${GITHUB_OUTPUT}"
            echo "version=${CUR}" >> "${GITHUB_OUTPUT}"
          else
            echo "no version bump (HEAD=${CUR}, HEAD~1=${PREV:-<none>}) — not a release"
            echo "is_release=false" >> "${GITHUB_OUTPUT}"
          fi

  check:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Free disk space
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: ./.github/actions/free-disk-space
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "^1.26.0"
          cache: false
      - name: Setup TinyGo
        uses: acifani/setup-tinygo@dd8a7075d951a7595b2ef2123ed0ab1af0c13e56 # v3.0.0
        with:
          tinygo-version: "0.39.0"
      - name: Setup wasm-tools
        uses: bytecodealliance/actions/wasm-tools/setup@9152e710e9f7182e4c29ad218e4f335a7b203613 # v1.1.3
        with:
          version: "1.247.0"
      - name: Setup protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "29.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      - name: Build
        run: cargo build
      - name: Test
        env:
          RUST_BACKTRACE: "1"
          OCI_INTEGRATION_TESTS: ${{ matrix.os == 'ubuntu-latest' && '1' || '' }}
          NATS_INTEGRATION_TESTS: ${{ matrix.os == 'ubuntu-latest' && '1' || '' }}
        run: |
          cargo test --workspace
      - name: Test with wasip3
        run: |
          cargo test -p wash-runtime --features wasip3
      - name: Test with wasi-tls + wasip3
        run: |
          cargo test -p wash-runtime --features wasi-tls,wasip3
      - name: Build benchmarks
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo bench -p wash-runtime --features wasip3 --no-run

  lint:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Free disk space
        uses: ./.github/actions/free-disk-space
      - name: Setup protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "29.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          rust-toolchain: nightly
          rust-components: rustfmt
      - name: Install cargo-machete
        uses: taiki-e/install-action@f48d2f8ba2b452934c948b7be1a768079c3632ff # v2.79.6
        with:
          tool: cargo-machete@0.8.0
      - name: Format
        run: |
          cargo +nightly fmt -- --check
      - name: Lint
        run: |
          cargo clippy --workspace --features wasip3,wasi-tls
      - name: Lint anyhow context message casing
        run: |
          # anyhow `.context()` / `.with_context()` strings are error messages,
          # which by Rust convention start lowercase so they compose into error
          # chains. Match sentence-case prose (capital + lowercase) so acronyms
          # and type names (HTTP, P3, DevRouter) are left untouched.
          #
          # Scope is production source only (crates/*/src), matching the clippy
          # job above; integration tests are not checked. Only single-line
          # context calls are matched.
          if matches=$(grep -rn --include='*.rs' -E '\.(with_)?context\((\|\| )?(format!\()?"[A-Z][a-z]' crates/*/src); then
            echo "::error::anyhow context messages should start with a lowercase letter (Rust convention); lowercase the first letter:"
            echo "$matches"
            exit 1
          fi
      - name: Check for unused dependencies
        run: |
          cargo machete

  # Build the wash runtime image per-arch with the buildx GHA cache, push
  # each arch by digest, and export a docker tarball per arch. The operator
  # e2e gate loads the amd64 tarball, so the bytes exercised in e2e are the
  # same bytes canary-publish later assembles into the multi-arch manifest
  # list (`canary`, `sha-<full-sha>`, and via release-tag.yml the released
  # `vX.Y.Z`). arm64 builds on every PR too so Dockerfile regressions are
  # caught before merge.
  wash-image:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true') && (github.event_name == 'pull_request' || ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'))
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      # Split into two single-output builds: dual `type=image`+`type=docker`
      # on one call confuses `digest` output (last write to
      # `containerimage.digest` wins → docker-tarball envelope, not
      # registry). The second call hits the cache the first wrote.
      - name: Build wash runtime image (tarball for operator-e2e)
        id: build_tar
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          outputs: type=docker,dest=/tmp/wash-image.tar,name=localhost/wasmcloud-wash:e2e
          # head_ref on PRs (the source branch, shared across re-pushes
          # and across PRs from the same branch); falls back to ref_name
          # on main pushes ("main"). Always falls back to the main scope
          # for cold-cache reads on first push.
          cache-from: |
            type=gha,scope=wash-${{ matrix.arch }}-${{ github.head_ref || github.ref_name }}
            type=gha,scope=wash-${{ matrix.arch }}-main
          cache-to: type=gha,scope=wash-${{ matrix.arch }}-${{ github.head_ref || github.ref_name }},mode=max
      - name: Push wash runtime image to GHCR by digest (main only)
        # PRs lack org-package write access; only push on main so
        # canary-publish can assemble the manifest after all gates pass.
        # No `cache-to` here — the first build already wrote it.
        if: github.event_name != 'pull_request'
        id: build_push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          outputs: type=image,name=ghcr.io/wasmcloud/wash,push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=gha,scope=wash-${{ matrix.arch }}-${{ github.head_ref || github.ref_name }}
            type=gha,scope=wash-${{ matrix.arch }}-main
      - name: Export digest
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build_push.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          if [[ -z "$DIGEST" ]]; then
            echo "no digest on build step output" >&2
            exit 1
          fi
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wash-image-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
      - name: Upload image tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wash-image-tarball-${{ matrix.arch }}
          path: /tmp/wash-image.tar
          if-no-files-found: error
          retention-days: 1

  # Integration gate: install the shared wash image alongside the
  # runtime-operator chart in a kind cluster, and run the operator's e2e
  # suite (including the messaging round-trip from #5074) against it. The
  # canary tag only moves if this passes. Also runs on PRs that touch wash,
  # the chart, or the e2e suite, so regressions are caught before merge
  # rather than after.
  runtime-operator-e2e:
    needs:
      - wash-image
    # `wash-image` runs via `if: always() && ...` to bypass the skipped
    # `changes` job on main pushes. Without an explicit `if:` here, GHA
    # propagates the skipped state of that indirect upstream through and
    # marks this job skipped even though `wash-image` itself succeeded.
    # Result: canary-publish never fires on main. Explicit gate on
    # wash-image's actual result is the documented workaround.
    if: always() && needs.wash-image.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wash-image-tarball-amd64
          path: /tmp
      - name: Load wash runtime image
        run: docker load -i /tmp/wash-image.tar
      - name: Build runtime-operator image
        working-directory: runtime-operator
        run: make docker-build IMG=localhost/runtime-operator:e2e
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: wasmcloud-e2e
          config: deploy/kind/kind-config.yaml
      - name: Run runtime-operator e2e against locally-built wash
        working-directory: runtime-operator
        run: make test-e2e
        env:
          # Operator and wash images are already built above; the suite
          # just needs to load them into kind.
          SKIP_IMAGE_BUILD: "true"
          BUILD_RUNTIME_IMAGE: "true"
          SKIP_RUNTIME_BUILD: "true"
          # Exercise the messaging spec — this is the regression test for
          # #5074 and is the whole reason the gate exists.
          MESSAGING_E2E_IMAGE: ghcr.io/wasmcloud/components/messaging-echo-rust:0.1.0
          PROMETHEUS_INSTALL_SKIP: "true"
          CERT_MANAGER_INSTALL_SKIP: "true"
          KIND_CLUSTER_NAME: wasmcloud-e2e
      - name: Dump diagnostics
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n wasmcloud-system -o wide || true
          echo "=== Events ==="
          kubectl get events -n wasmcloud-system --sort-by=.lastTimestamp || true
          echo "=== Operator Logs ==="
          kubectl logs -n wasmcloud-system -l wasmcloud.com/name=runtime-operator --tail=200 || true
          echo "=== Host Logs ==="
          kubectl logs -n wasmcloud-system -l wasmcloud.com/name=hostgroup --tail=300 || true
          echo "=== CRD Resources ==="
          kubectl get hosts.runtime.wasmcloud.dev -A -o yaml || true
          kubectl get workloaddeployments.runtime.wasmcloud.dev -A -o yaml || true
          kubectl get workloads.runtime.wasmcloud.dev -A -o yaml || true

  gate:
    needs:
      - release-detect
      - check
      - lint
      - wash-image
      - wash-image-wasip3
      - runtime-operator-e2e
      - canary-publish
      - canary-binaries
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs to pass or be skipped
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
          CANARY_PUBLISH_RESULT: ${{ needs.canary-publish.result }}
          CANARY_BINARIES_RESULT: ${{ needs.canary-binaries.result }}
          IS_RELEASE: ${{ needs.release-detect.outputs.is_release }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            exit 1
          fi
          # Main pushes must publish canary.
          if [[ "${REF}" == "refs/heads/main" ]] && [[ "${CANARY_PUBLISH_RESULT}" != "success" ]]; then
            echo "canary-publish result=${CANARY_PUBLISH_RESULT} on main push; expected success" >&2
            exit 1
          fi
          # Release commits must also build per-target binaries that
          # release-tag.yml attaches to the GH Release.
          if [[ "${IS_RELEASE}" == "true" ]] && [[ "${CANARY_BINARIES_RESULT}" != "success" ]]; then
            echo "canary-binaries result=${CANARY_BINARIES_RESULT} on release commit; expected success" >&2
            exit 1
          fi

  # Tag promotion: only push `canary` once check, lint, and the
  # runtime-operator e2e have all passed against this commit. Assembles
  # the multi-arch manifest list from the per-arch digests that
  # wash-image already pushed (amd64 was also exercised by the e2e gate).
  # The `sha-<full-sha>` tag is what release-tag.yml pins to when it
  # promotes this canary digest as the immutable vX.Y.Z release tag —
  # `canary` itself moves on every subsequent main push, so we cannot
  # rely on it.
  canary-publish:
    # Gate canary on the things that actually exercise the published bytes:
    # `wash-image` is what gets pushed by digest, and `runtime-operator-e2e`
    # loads that exact image into kind and runs the suite. `check`/`lint`
    # are workspace-level signals that have no bearing on the image we're
    # promoting, so they intentionally aren't gates here. `always()` is
    # required to break the chained-skip propagation from the path-filter
    # `changes` job (skipped on main) which would otherwise mark this job
    # skipped before evaluating the explicit gate.
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      needs.wash-image.result == 'success' &&
      needs.runtime-operator-e2e.result == 'success'
    needs:
      - runtime-operator-e2e
      - wash-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: wash-image-digest-*
          merge-multiple: true
      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/wasmcloud/wash
          tags: |
            type=raw,value=canary
            type=sha,format=long,prefix=sha-
      - name: Create manifest list and push tags
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          if (( ${#tags[@]} == 0 )); then
            echo "No tags from docker meta. Refusing to push" >&2
            exit 1
          fi
          shopt -s nullglob
          digests=( * )
          shopt -u nullglob
          if (( ${#digests[@]} == 0 )); then
            echo "No digests downloaded. Refusing to push" >&2
            exit 1
          fi
          args=()
          for tag in "${tags[@]}"; do
            args+=(-t "$tag")
          done
          for d in "${digests[@]}"; do
            args+=("ghcr.io/wasmcloud/wash@sha256:$d")
          done
          docker buildx imagetools create "${args[@]}"
      - name: Inspect image
        run: |
          docker buildx imagetools inspect "ghcr.io/wasmcloud/wash:${STEPS_META_OUTPUTS_VERSION}"
        env:
          STEPS_META_OUTPUTS_VERSION: ${{ steps.meta.outputs.version }}

  # wasip3 image variant. Builds wash with the `wasip3,wasi-tls` features
  # (WASI Preview 3 compiled in) and publishes it as `canary-wasip3` /
  # `sha-<full-sha>-wasip3`.
  wash-image-wasip3:
    needs:
      - changes
      - runtime-operator-e2e
    if: |
      always() &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true') &&
      (((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main')) &&
      needs.runtime-operator-e2e.result == 'success'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/docker-build-push.yml
    with:
      image: ghcr.io/wasmcloud/wash
      build-args: |
        CARGO_FEATURES=wasip3,wasi-tls
      # Push (and the manifest merge) only on main; PRs build to validate.
      push: ${{ github.event_name != 'pull_request' }}
      push-by-digest: ${{ github.event_name != 'pull_request' }}
      tags: |
        type=raw,value=canary-wasip3
        type=sha,format=long,prefix=sha-,suffix=-wasip3

  # Canary matrix binary build. Runs on every release commit on main —
  # detected by `release-detect` as a Cargo.toml workspace version bump
  # vs the parent commit — so release-tag.yml can promote the exact
  # bytes that the canary CI tested instead of rebuilding on tag.
  # Skipped for non-release main pushes to avoid burning ~7 runners on
  # every commit. Manual fallback: `gh workflow run wash.yml --ref main
  # -f is_release=true`.
  canary-binaries:
    # Fires whenever `release-detect` says this is a release commit —
    # detected via Cargo.toml workspace version bump (HEAD vs HEAD~1)
    # or forced via `workflow_dispatch` input. `always()` breaks the
    # skipped-`changes` propagation; the explicit per-need success
    # gates restore the default `success()` check.
    if: |
      always() &&
      needs.release-detect.outputs.is_release == 'true' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      needs.check.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.runtime-operator-e2e.result == 'success'
    needs:
      - release-detect
      - check
      - lint
      - runtime-operator-e2e
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            # Pin minimum glibc to 2.17 (RHEL 7 / CentOS 7 era) for broad
            # compatibility with mainstream distros. GPU drivers on Ubuntu,
            # Fedora, Arch, RHEL, etc. are glibc-linked, so this binary can
            # dlopen them reliably (unlike the musl build).
            buildTarget: x86_64-unknown-linux-gnu.2.17
            buildCommand: cargo zigbuild
            artifact: wash-x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            bin: wash
          - target: aarch64-unknown-linux-gnu
            buildTarget: aarch64-unknown-linux-gnu.2.17
            buildCommand: cargo zigbuild
            artifact: wash-aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            bin: wash
          - target: x86_64-unknown-linux-musl
            buildCommand: cargo zigbuild
            artifact: wash-x86_64-unknown-linux-musl
            runner: ubuntu-latest
            bin: wash
          - target: aarch64-unknown-linux-musl
            buildCommand: cargo zigbuild
            artifact: wash-aarch64-unknown-linux-musl
            runner: ubuntu-latest
            bin: wash
          - target: x86_64-apple-darwin
            buildCommand: cargo build
            artifact: wash-x86_64-apple-darwin
            runner: macos-15-intel
            bin: wash
          - target: aarch64-apple-darwin
            buildCommand: cargo build
            artifact: wash-aarch64-apple-darwin
            runner: macos-latest
            bin: wash
          - target: x86_64-pc-windows-msvc
            buildCommand: cargo build
            artifact: wash-x86_64-pc-windows-msvc
            runner: windows-latest
            bin: wash.exe
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          rust-toolchain: stable
          # Only needed for ubuntu
          install-zigbuild: ${{ matrix.runner == 'ubuntu-latest' }}
          rust-targets: "${{ matrix.target }}"

      - name: Setup protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "29.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set SOURCE_DATE_EPOCH from commit timestamp
        # Pin embedded timestamps in the binary to the merge commit's author
        # date so the same commit produces the same bytes on every rebuild.
        # cargo and rustc honor SOURCE_DATE_EPOCH for build metadata; this
        # is a prerequisite for any future move toward bit-reproducible
        # SLSA L4 builds. See https://reproducible-builds.org/docs/source-date-epoch/
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "${GITHUB_ENV}"

      - name: Build binary (${{ matrix.target }})
        run: |
          ${{ matrix.buildCommand }} --release --target ${{ matrix.buildTarget || matrix.target }}
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} ${{ matrix.artifact }}

      - name: Create Windows zip archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.bin }}" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload Windows zip artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}.zip
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error
