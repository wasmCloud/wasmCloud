name: wash

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  # Drop most DWARF; keep enough for usable backtraces. Shrinks target/ by
  # several GB on this workspace (wasmtime, OTel, oci-client).
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only
  # Swatinem/rust-cache doesn't cache target/<profile>/incremental, so on CI
  # incremental artifacts are pure disk cost with no reuse.
  CARGO_INCREMENTAL: "0"

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            relevant:
              - '.github/workflows/wash.yml'
              - 'crates/**'
              - 'src/**'
              - 'tests/**'
              - 'wit/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'rustfmt.toml'
              - 'runtime-operator/test/e2e/**'
              - 'charts/runtime-operator/**'
              - 'deploy/kind/kind-config.yaml'
            workflow:
              - '.github/workflows/wash.yml'

  check:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Free disk space
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: ./.github/actions/free-disk-space
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "^1.26.0"
          cache: false
      - name: Setup TinyGo
        uses: acifani/setup-tinygo@dd8a7075d951a7595b2ef2123ed0ab1af0c13e56 # v3.0.0
        with:
          tinygo-version: "0.39.0"
      - name: Setup wasm-tools
        uses: bytecodealliance/actions/wasm-tools/setup@9152e710e9f7182e4c29ad218e4f335a7b203613 # v1.1.3
        with:
          version: "1.247.0"
      - name: Setup protoc
        uses: ./.github/actions/setup-protoc
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      # Compile the wash-runtime wasm test fixtures. The test/bench targets
      # `include_bytes!` these, so they must exist before the `cargo test`
      # steps below. Targets wasm32-wasip2/wasip1 come from setup-rust.
      - name: Build test fixtures
        run: cargo xtask build-fixtures
      - name: Build
        run: cargo build
      - name: Test
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --workspace
      - name: Test with wasi-tls + wasm_component_model_implements
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test -p wash-runtime --features wasi-tls,wasm_component_model_implements,host-component-plugins
      # Docker/registry-backed `#[ignore]` integration tests, Linux only: the
      # macOS/Windows hosted runners have no Docker daemon (and macOS can't get
      # one — no nested virtualization). `-- --ignored` runs ONLY the ignored
      # tests, once. Scoped to the crates we gate this way (wash-runtime + wash's
      # OCI suite) so it doesn't pull in the pre-existing network-only wit tests
      # in `crates/wash/tests/integration_wit.rs`.
      - name: Integration tests (Docker/registry, Linux only)
        if: matrix.os == 'ubuntu-latest'
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test -p wash-runtime --features wasm_component_model_implements,wasi-tls,host-component-plugins -- --ignored
          cargo test -p wash --test integration_oci -- --ignored
      # Bitrot guard: the benches must still compile. Built via `cargo test
      # --benches` rather than `cargo bench --no-run` because the `bench`
      # profile inherits `release`, which shares no artifacts with the dev/test
      # builds above and so rebuilds the whole tree (wasmtime included) just to
      # compile-check four targets; the test profile reuses them. wash-runtime
      # gates no code on `debug_assertions`, so both profiles compile the same
      # source. Optimized bench builds happen only in bench.yml (manual
      # dispatch), so an opt-level-only break surfaces there, not here.
      - name: Build benchmarks
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo test -p wash-runtime --benches --no-run

  lint:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Free disk space
        uses: ./.github/actions/free-disk-space
      - name: Setup protoc
        uses: ./.github/actions/setup-protoc
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          rust-toolchain: nightly
          rust-components: rustfmt
      - name: Install cargo-machete
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        env:
          # Authenticate the action's GitHub API calls so they aren't throttled
          # by the 60/hr anonymous per-IP limit shared across hosted runners.
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-machete@0.8.0
      - name: Format
        run: |
          cargo +nightly fmt -- --check
      - name: Lint
        run: |
          cargo clippy --workspace --features wasm_component_model_implements,wasi-tls,host-component-plugins
      - name: Lint anyhow context message casing
        run: |
          # anyhow `.context()` / `.with_context()` strings are error messages,
          # which by Rust convention start lowercase so they compose into error
          # chains. Match sentence-case prose (capital + lowercase) so acronyms
          # and type names (HTTP, P3, DevRouter) are left untouched.
          #
          # Scope is production source only (crates/*/src), matching the clippy
          # job above; integration tests are not checked. Only single-line
          # context calls are matched.
          if matches=$(grep -rn --include='*.rs' -E '\.(with_)?context\((\|\| )?(format!\()?"[A-Z][a-z]' crates/*/src); then
            echo "::error::anyhow context messages should start with a lowercase letter (Rust convention); lowercase the first letter:"
            echo "$matches"
            exit 1
          fi
      - name: Check for unused dependencies
        run: |
          cargo machete

  # Build the wash runtime image per-arch with the buildx GHA cache, push
  # each arch by digest, and export a docker tarball per arch. The operator
  # e2e gate loads the amd64 tarball, so the bytes exercised in e2e are the
  # same bytes canary-publish later assembles into the multi-arch manifest
  # list (`canary`, `sha-<full-sha>`, and via release-tag.yml the released
  # `vX.Y.Z`). arm64 builds on every PR too so Dockerfile regressions are
  # caught before merge.
  wash-image:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true') && (github.event_name == 'pull_request' || ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'))
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      # Split into two single-output builds: dual `type=image`+`type=docker`
      # on one call confuses `digest` output (last write to
      # `containerimage.digest` wins → docker-tarball envelope, not
      # registry). The second call hits the cache the first wrote.
      # RELEASE image — DEFAULT features only: exactly what we ship. The
      # operator-e2e `release` leg loads this tarball, so we test the bytes we
      # release. build_push below reuses this build's cache (same features), so
      # the pushed canary is byte-identical to what that e2e leg exercised.
      - name: Build wash runtime image — release / default features (tarball for operator-e2e)
        id: build_tar_release
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          outputs: type=docker,dest=/tmp/wash-image-release.tar,name=localhost/wasmcloud-wash:e2e
          # No `build-args`: the Dockerfile's `CARGO_FEATURES=""` default applies
          # (a plain `cargo build`, default features).
          # head_ref on PRs (the source branch, shared across re-pushes and
          # across PRs from the same branch); falls back to ref_name on main
          # ("main"), then the main scope for cold-cache reads on first push.
          cache-from: |
            type=gha,scope=wash-release-${{ matrix.arch }}-${{ github.head_ref || github.ref_name }}
            type=gha,scope=wash-release-${{ matrix.arch }}-main
          cache-to: type=gha,scope=wash-release-${{ matrix.arch }}-${{ github.head_ref || github.ref_name }},mode=max
      # ALL-FEATURES image — every optional host feature on (`(implements ..)`
      # multiplexing AND host component plugins). NOT shipped: a coverage build
      # the operator-e2e `all-features` leg loads to exercise those features on a
      # host built with them (a released host can't run them). amd64 only — the
      # sole consumer is that e2e leg.
      - name: Build wash runtime image — all features (tarball for operator-e2e)
        id: build_tar_all_features
        if: matrix.arch == 'amd64'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          outputs: type=docker,dest=/tmp/wash-image-all-features.tar,name=localhost/wasmcloud-wash:e2e
          build-args: |
            CARGO_FEATURES=wasm_component_model_implements,host-component-plugins
          cache-from: |
            type=gha,scope=wash-all-features-${{ matrix.arch }}-${{ github.head_ref || github.ref_name }}
            type=gha,scope=wash-all-features-${{ matrix.arch }}-main
          cache-to: type=gha,scope=wash-all-features-${{ matrix.arch }}-${{ github.head_ref || github.ref_name }},mode=max
      - name: Push wash runtime image to GHCR by digest (main only)
        # PRs lack org-package write access; only push on main so
        # canary-publish can assemble the manifest after all gates pass.
        # Ships DEFAULT features only — byte-identical to the RELEASE tarball
        # above (whose cache this reuses), so the pushed canary is the exact
        # bytes the operator-e2e `release` leg tested. No `cache-to` — the
        # release build already wrote it.
        if: github.event_name != 'pull_request'
        id: build_push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          outputs: type=image,name=ghcr.io/wasmcloud/wash,push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=gha,scope=wash-release-${{ matrix.arch }}-${{ github.head_ref || github.ref_name }}
            type=gha,scope=wash-release-${{ matrix.arch }}-main
      - name: Export digest
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build_push.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          if [[ -z "$DIGEST" ]]; then
            echo "no digest on build step output" >&2
            exit 1
          fi
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wash-image-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
      # Only amd64 tarballs are consumed (operator-e2e runs on amd64). The
      # release image also builds on arm64 above to prime build_push's cache
      # there, but its tarball isn't uploaded.
      - name: Upload release image tarball
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wash-image-tarball-release-${{ matrix.arch }}
          path: /tmp/wash-image-release.tar
          if-no-files-found: error
          retention-days: 1
      - name: Upload all-features image tarball
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wash-image-tarball-all-features-${{ matrix.arch }}
          path: /tmp/wash-image-all-features.tar
          if-no-files-found: error
          retention-days: 1

  # Build ONLY the e2e fixture components (not the whole `check` matrix) plus the
  # in-repo wash, and upload them. The runtime-operator-e2e all-features leg then
  # pushes them into the in-cluster registry without a Rust build on that leg.
  #
  # TODO(wash release): the in-repo wash is built here (and uploaded for the push
  # side) only because the released wash can't build fixtures from their local
  # wkg.toml refs. Once it can, use setup-wash-action instead and drop the protoc
  # step below (needed only to compile wash, not the fixtures).
  e2e-fixtures:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true') && (github.event_name == 'pull_request' || ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/free-disk-space
      - name: Setup protoc
        uses: ./.github/actions/setup-protoc
      - uses: ./.github/actions/setup-rust
      - name: Build e2e fixture components + wash
        working-directory: runtime-operator
        run: make e2e-images
        env:
          E2E_IMAGES_MODE: build
          E2E_FIXTURES_DIR: ${{ runner.temp }}/e2e-fixtures
      - name: Upload e2e fixture components + wash
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-fixtures
          path: ${{ runner.temp }}/e2e-fixtures
          if-no-files-found: error
          retention-days: 1

  # Integration gate: install the shared wash image alongside the
  # runtime-operator chart in a kind cluster, and run the operator's e2e
  # suite (including the messaging round-trip from #5074) against it. The
  # canary tag only moves if this passes. Also runs on PRs that touch wash,
  # the chart, or the e2e suite, so regressions are caught before merge
  # rather than after.
  runtime-operator-e2e:
    needs:
      - wash-image
      - e2e-fixtures
    # `wash-image` runs via `if: always() && ...` to bypass the skipped
    # `changes` job on main pushes. Without an explicit `if:` here, GHA
    # propagates the skipped state of that indirect upstream through and
    # marks this job skipped even though `wash-image` itself succeeded.
    # Result: canary-publish never fires on main. Explicit gate on
    # wash-image's actual result is the documented workaround.
    if: always() && needs.wash-image.result == 'success' && needs.e2e-fixtures.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    # Run the suite twice. Both legs stand up an in-cluster oci-registry on a
    # pinned all-features `registry` hostgroup and serve every fixture from it;
    # the legs differ only in the image the DEFAULT (fixture) hostgroup runs:
    #   release      — the shipped DEFAULT-features build. Validates that the
    #                  shipped host pulls the fixtures from the registry (insecure
    #                  HTTP) and runs them. `implements` self-skips (it needs a
    #                  feature host); http + messaging run.
    #   all-features — every optional host feature on; runs the full set incl.
    #                  `implements`. Not shipped — a coverage build.
    # default_tag/registry_tag select the per-hostgroup images (loaded below); the
    # registry host is always all-features (it needs the async wasmcloud:blobstore
    # plugin).
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: release
            default_tag: release
            registry_tag: all-features
          - variant: all-features
            default_tag: all-features
            registry_tag: all-features
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-go
      # The fixture components + the in-repo wash were built by the e2e-fixtures
      # job; download them so `make e2e-images` (push mode) just deploys the
      # registry and pushes — no Rust build on this leg. Both legs push fixtures.
      - name: Download e2e fixture components + wash
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e2e-fixtures
          path: ${{ runner.temp }}/e2e-fixtures
      # The registry host is always all-features; load it as :all-features on both
      # legs. The tarballs internally tag localhost/wasmcloud-wash:e2e, so retag.
      - name: Download all-features host image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wash-image-tarball-all-features-amd64
          path: /tmp
      - name: Load all-features host image
        run: |
          docker load -i /tmp/wash-image-all-features.tar
          docker tag localhost/wasmcloud-wash:e2e localhost/wasmcloud-wash:all-features
      # The release leg's fixture host is the shipped build; load it as :release
      # alongside the all-features registry host so one cluster runs both.
      - name: Download release host image
        if: matrix.variant == 'release'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wash-image-tarball-release-amd64
          path: /tmp
      - name: Load release host image
        if: matrix.variant == 'release'
        run: |
          docker load -i /tmp/wash-image-release.tar
          docker tag localhost/wasmcloud-wash:e2e localhost/wasmcloud-wash:release
      - name: Build runtime-operator image
        working-directory: runtime-operator
        run: make docker-build IMG=localhost/runtime-operator:e2e
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: wasmcloud-e2e
          config: deploy/kind/kind-config.yaml
      - name: Run runtime-operator e2e (${{ matrix.variant }}) against locally-built wash
        working-directory: runtime-operator
        run: make test-e2e
        env:
          # Operator and wash images are already built above; the suite
          # just needs to load them into kind.
          SKIP_IMAGE_BUILD: "true"
          BUILD_RUNTIME_IMAGE: "true"
          SKIP_RUNTIME_BUILD: "true"
          # Both legs run the in-cluster registry. The default (fixture) hostgroup
          # runs default_tag; the registry hostgroup runs registry_tag (always
          # all-features). implements self-skips when they differ (release leg).
          E2E_IN_CLUSTER_REGISTRY: "true"
          E2E_RUNTIME_IMAGE_TAG: ${{ matrix.default_tag }}
          E2E_REGISTRY_HOST_IMAGE_TAG: ${{ matrix.registry_tag }}
          # Reuse the components + wash the e2e-fixtures job built (downloaded
          # above): `make e2e-images` pushes them rather than rebuilding.
          E2E_IMAGES_MODE: push
          E2E_FIXTURES_DIR: ${{ runner.temp }}/e2e-fixtures
          PROMETHEUS_INSTALL_SKIP: "true"
          CERT_MANAGER_INSTALL_SKIP: "true"
          KIND_CLUSTER_NAME: wasmcloud-e2e
      - name: Dump diagnostics
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n wasmcloud-system -o wide || true
          echo "=== Events ==="
          kubectl get events -n wasmcloud-system --sort-by=.lastTimestamp || true
          echo "=== Operator Logs ==="
          kubectl logs -n wasmcloud-system -l wasmcloud.com/name=runtime-operator --tail=200 || true
          echo "=== Host Logs ==="
          kubectl logs -n wasmcloud-system -l wasmcloud.com/name=hostgroup --tail=300 || true
          echo "=== CRD Resources ==="
          kubectl get hosts.runtime.wasmcloud.dev -A -o yaml || true
          kubectl get workloaddeployments.runtime.wasmcloud.dev -A -o yaml || true
          kubectl get workloads.runtime.wasmcloud.dev -A -o yaml || true

  gate:
    needs:
      - check
      - lint
      - wash-image
      - e2e-fixtures
      - runtime-operator-e2e
      - canary-publish
      - canary-binaries
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs to pass or be skipped
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
          CANARY_PUBLISH_RESULT: ${{ needs.canary-publish.result }}
          CANARY_BINARIES_RESULT: ${{ needs.canary-binaries.result }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            exit 1
          fi
          # Main pushes must publish canary.
          if [[ "${REF}" == "refs/heads/main" ]] && [[ "${CANARY_PUBLISH_RESULT}" != "success" ]]; then
            echo "canary-publish result=${CANARY_PUBLISH_RESULT} on main push; expected success" >&2
            exit 1
          fi
          # Main pushes must also build the per-target binaries that
          # release-tag.yml attaches to the GH Release.
          if [[ "${REF}" == "refs/heads/main" ]] && [[ "${CANARY_BINARIES_RESULT}" != "success" ]]; then
            echo "canary-binaries result=${CANARY_BINARIES_RESULT} on main push; expected success" >&2
            exit 1
          fi

  # Tag promotion: only push `canary` once check, lint, and the
  # runtime-operator e2e have all passed against this commit. Assembles
  # the multi-arch manifest list from the per-arch digests that
  # wash-image already pushed (amd64 was also exercised by the e2e gate).
  # The `sha-<full-sha>` tag is what release-tag.yml pins to when it
  # promotes this canary digest as the immutable vX.Y.Z release tag —
  # `canary` itself moves on every subsequent main push, so we cannot
  # rely on it.
  canary-publish:
    # Gate canary on the things that actually exercise the published bytes:
    # `wash-image` is what gets pushed by digest, and `runtime-operator-e2e`
    # loads that exact image into kind and runs the suite. `check`/`lint`
    # are workspace-level signals that have no bearing on the image we're
    # promoting, so they intentionally aren't gates here. `always()` is
    # required to break the chained-skip propagation from the path-filter
    # `changes` job (skipped on main) which would otherwise mark this job
    # skipped before evaluating the explicit gate.
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      needs.wash-image.result == 'success' &&
      needs.runtime-operator-e2e.result == 'success'
    needs:
      - runtime-operator-e2e
      - wash-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: wash-image-digest-*
          merge-multiple: true
      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/wasmcloud/wash
          tags: |
            type=raw,value=canary
            type=sha,format=long,prefix=sha-
      - name: Create manifest list and push tags
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          if (( ${#tags[@]} == 0 )); then
            echo "No tags from docker meta. Refusing to push" >&2
            exit 1
          fi
          shopt -s nullglob
          digests=( * )
          shopt -u nullglob
          if (( ${#digests[@]} == 0 )); then
            echo "No digests downloaded. Refusing to push" >&2
            exit 1
          fi
          args=()
          for tag in "${tags[@]}"; do
            args+=(-t "$tag")
          done
          for d in "${digests[@]}"; do
            args+=("ghcr.io/wasmcloud/wash@sha256:$d")
          done
          docker buildx imagetools create "${args[@]}"
      - name: Inspect image
        run: |
          docker buildx imagetools inspect "ghcr.io/wasmcloud/wash:${STEPS_META_OUTPUTS_VERSION}"
        env:
          STEPS_META_OUTPUTS_VERSION: ${{ steps.meta.outputs.version }}

  # Canary matrix binary build. Runs on every push to main so each commit
  # exercises the full per-target matrix (including the s390x/musl cross
  # builds that the regular `check`/`lint` jobs don't cover), and so
  # release-tag.yml can promote the exact bytes that the canary CI tested
  # instead of rebuilding on tag.
  canary-binaries:
    # Fires on every main push and on `workflow_dispatch`, plus on PRs that
    # edit this workflow so a newly added build target is validated before
    # merge rather than only after it lands on main. `always()` breaks the
    # skipped-`changes` propagation; the explicit per-need success gates
    # restore the default `success()` check.
    if: |
      always() &&
      needs.check.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.runtime-operator-e2e.result == 'success' &&
      (
        ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' && needs.changes.outputs.workflow == 'true')
      )
    needs:
      - changes
      - check
      - lint
      - runtime-operator-e2e
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            # Pin minimum glibc to 2.17 (RHEL 7 / CentOS 7 era) for broad
            # compatibility with mainstream distros. GPU drivers on Ubuntu,
            # Fedora, Arch, RHEL, etc. are glibc-linked, so this binary can
            # dlopen them reliably (unlike the musl build).
            buildTarget: x86_64-unknown-linux-gnu.2.17
            buildCommand: cargo zigbuild
            artifact: wash-x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            bin: wash
          - target: aarch64-unknown-linux-gnu
            buildTarget: aarch64-unknown-linux-gnu.2.17
            buildCommand: cargo zigbuild
            artifact: wash-aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            bin: wash
          - target: s390x-unknown-linux-gnu
            buildTarget: s390x-unknown-linux-gnu.2.17
            buildCommand: cargo zigbuild
            artifact: wash-s390x-unknown-linux-gnu
            runner: ubuntu-latest
            bin: wash
          - target: x86_64-unknown-linux-musl
            buildCommand: cargo zigbuild
            artifact: wash-x86_64-unknown-linux-musl
            runner: ubuntu-latest
            bin: wash
          - target: aarch64-unknown-linux-musl
            buildCommand: cargo zigbuild
            artifact: wash-aarch64-unknown-linux-musl
            runner: ubuntu-latest
            bin: wash
          - target: x86_64-apple-darwin
            buildCommand: cargo build
            artifact: wash-x86_64-apple-darwin
            runner: macos-15-intel
            bin: wash
          - target: aarch64-apple-darwin
            buildCommand: cargo build
            artifact: wash-aarch64-apple-darwin
            runner: macos-latest
            bin: wash
          - target: x86_64-pc-windows-msvc
            buildCommand: cargo build
            artifact: wash-x86_64-pc-windows-msvc
            runner: windows-latest
            bin: wash.exe
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          rust-toolchain: stable
          # Only needed for ubuntu
          install-zigbuild: ${{ matrix.runner == 'ubuntu-latest' }}
          rust-targets: "${{ matrix.target }}"

      - name: Setup protoc
        uses: ./.github/actions/setup-protoc

      - name: Set SOURCE_DATE_EPOCH from commit timestamp
        # Pin embedded timestamps in the binary to the merge commit's author
        # date so the same commit produces the same bytes on every rebuild.
        # cargo and rustc honor SOURCE_DATE_EPOCH for build metadata; this
        # is a prerequisite for any future move toward bit-reproducible
        # SLSA L4 builds. See https://reproducible-builds.org/docs/source-date-epoch/
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "${GITHUB_ENV}"

      - name: Build binary (${{ matrix.target }})
        env:
          # Retry transient crates.io download failures (e.g. SSL eof) more
          # aggressively than cargo's default of 3.
          CARGO_NET_RETRY: "10"
        run: |
          # Release binaries ship with default features only — no
          # `(implements ..)` multiplexing (it is exercised in the e2e host
          # image, not shipped in a release build).
          ${{ matrix.buildCommand }} --release --target ${{ matrix.buildTarget || matrix.target }} -p wash
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} ${{ matrix.artifact }}

      - name: Create Windows zip archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.bin }}" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload Windows zip artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}.zip
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error
