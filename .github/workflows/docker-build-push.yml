name: docker-build-push
on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        required: false
        default: "."
      file:
        type: string
        required: false
        description: "Dockerfile to use for the build. Defaults to Dockerfile in the working directory"
        default: "./Dockerfile"
      image:
        type: string
        required: true
        description: "Image to use for the build WITHOUT the tag"
      tags:
        type: string
        required: true
        description: "Tags to use for the image. Follows the format of docker/metadata-action@v6"
      build-args:
        type: string
        required: false
        description: "Build arguments to pass to docker build"
        default: ""
      push:
        type: boolean
        description: "Build and Push Image. Default=false"
        required: false
        default: false
      push-by-digest:
        type: boolean
        description: "Push image by digest to the registry (required for manifest assembly). Set false to build locally without pushing, e.g. on pull-request runs where the token lacks org-package write access. Default=true"
        required: false
        default: true
      build-contexts:
        type: string
        required: false
        description: "Additional build contexts"
      build-cache:
        type: boolean
        required: false
        description: "Enables Github Actions Image cache. Default=true"
        default: true
    outputs:
      image_digest:
        description: "Image digest of the container that was built"
        value: ${{ jobs.build.outputs.image_digest }}
      artifact_prefix:
        description: "Image digest of the container that was built without the sha256: prefix"
        value: ${{ jobs.build.outputs.artifact_prefix }}

# Reusable workflow: declaring `read-all` here would require every caller's
# `uses:` job to grant the full superset of read scopes. Keep this empty
# and let each job below request only what it needs.
permissions: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      artifact_prefix: ${{ steps.meta.outputs.artifact_prefix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Meta
        id: meta
        env:
          INPUTS_IMAGE: ${{ inputs.image }}
        run: |
          # Create a prefix for the artifact name by taking the image name, removing any registry and replacing / and : with _
          ARTIFACT_PREFIX=$(echo "${INPUTS_IMAGE}" | sed 's/.*\///; s/[\/:]/_/g')
          echo "artifact_prefix=${ARTIFACT_PREFIX}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          file: ${{ inputs.file }}
          context: ${{ inputs.working-directory }}
          tags: ${{ inputs.image }}
          build-contexts: ${{ inputs.build-contexts }}
          outputs: type=image,push-by-digest=${{ inputs.push-by-digest }},name-canonical=true,push=${{ inputs.push-by-digest }}
          build-args: ${{ inputs.build-args }}
          cache-from: |
            type=gha,scope=buildx-${{ steps.meta.outputs.artifact_prefix }}-${{ matrix.arch }}-${{ github.ref_name }}
            type=gha,scope=buildx-${{ steps.meta.outputs.artifact_prefix }}-${{ matrix.arch }}-main
          cache-to: |
            type=gha,scope=buildx-${{ steps.meta.outputs.artifact_prefix }}-${{ matrix.arch }}-${{ github.ref_name }},mode=max

      - name: Export digest
        id: export
        if: ${{ inputs.push-by-digest }}
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          DIGESTS_DIR: ${{ runner.temp }}/digests
        run: | #shell
          mkdir -p "${DIGESTS_DIR}"
          touch "${DIGESTS_DIR}/${BUILD_DIGEST#sha256:}"

      - name: Upload digest
        if: ${{ inputs.push-by-digest }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ steps.meta.outputs.artifact_prefix }}-${{ github.run_id }}-linux-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: ${{ inputs.push }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    needs:
      - build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ needs.build.outputs.artifact_prefix }}-${{ github.run_id }}-*
          merge-multiple: true

      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ inputs.image }}
          tags: ${{ inputs.tags }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${INPUTS_IMAGE}@sha256:%s " *)
        env:
          INPUTS_IMAGE: ${{ inputs.image }}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${INPUTS_IMAGE}:${STEPS_META_OUTPUTS_VERSION}"
        env:
          INPUTS_IMAGE: ${{ inputs.image }}
          STEPS_META_OUTPUTS_VERSION: ${{ steps.meta.outputs.version }}
