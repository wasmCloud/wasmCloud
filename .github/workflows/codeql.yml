name: codeql

# CodeQL static analysis for Rust (workspace) and Go (runtime-gateway,
# runtime-operator). Findings are uploaded to the Security tab as code
# scanning alerts. Complements audit.yml (cargo-audit on dependency
# advisories) by analysing first-party code paths for vulnerable patterns.

on:
  schedule:
    # Weekly Mondays at 09:00 UTC. Spaced apart from scorecard (Wed) and
    # audit (daily) so a single bad runner image doesn't take all three out.
    # CodeQL on Rust + Go matrix is ~60 min total, so we run it weekly
    # rather than per-PR; audit.yml + cargo's own checks cover the
    # per-commit fast-feedback layer.
    - cron: "0 9 * * 1"
  workflow_dispatch:
  # Validate the analysis on PRs that touch the workflow itself or the
  # setup-rust composite action it depends on — otherwise a breakage only
  # surfaces on the weekly cron and we lose a week of coverage.
  pull_request:
    paths:
      - ".github/workflows/codeql.yml"
      - ".github/actions/setup-rust/**"

permissions: read-all

jobs:
  analyze-rust:
    name: CodeQL (Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # This job builds the whole workspace --all-targets and a CodeQL
      # database on one runner; reclaim disk so the build isn't killed midway.
      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Setup protoc
        # wash-runtime's build.rs invokes prost-build / tonic-build, which
        # needs protoc plus the well-known .proto includes on PATH. Matches
        # the version pinned by wash.yml and examples.yml.
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "29.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: rust
          # Pull the newest CodeQL bundle at runtime rather than the version
          # shipped with this action pin — keeps the Rust extractor (and its
          # bundled rust-analyzer) current without bumping the action SHA.
          tools: latest
          # security-and-quality includes the security suite plus quality
          # checks; security-extended is the security-only superset of the
          # default suite. Use security-extended to keep noise down on a
          # repo this size.
          queries: security-extended
          # Point the extractor at cargo's default target dir (workspace
          # root = ${{ github.workspace }}) so it picks up the proc-macro
          # artifacts built below; without warm proc-macros, rust-analyzer
          # fails to expand tracing::*, anyhow::*, and std macros like
          # vec!/format!, which tanks the "calls with resolved target"
          # quality metric. We deliberately do NOT set CARGO_TARGET_DIR as
          # a job env: that env var propagates into the child `cargo build`
          # that `cargo xtask build-fixtures` runs in the nested fixtures
          # workspace, redirecting its output and breaking xtask's
          # post-build artifact lookup.
          config: |
            extraction:
              rust:
                cargo_target_dir: ${{ github.workspace }}/target

      # `cargo build --all-targets` compiles the wash-runtime test/bench
      # targets, which `include_bytes!` the wasm fixtures. Build them first.
      - name: Build test fixtures
        run: cargo xtask build-fixtures

      - name: Build workspace
        run: cargo build --workspace --all-targets --locked

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:rust"

  analyze-go:
    name: CodeQL (Go - ${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        module: [runtime-gateway, runtime-operator]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ matrix.module }}/go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go
          source-root: ${{ matrix.module }}
          queries: security-extended

      - name: Build
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          working-directory: ${{ matrix.module }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:go-${{ matrix.module }}"