name: audit

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Daily at 13:00 UTC to catch advisories disclosed against existing pinned versions.
    - cron: "0 13 * * *"
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            relevant:
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.github/workflows/audit.yml'

  cargo-audit:
    needs:
      - changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install cargo-audit
        uses: taiki-e/install-action@3fa6878dc4ae603f73960271565a082bf196ab96 # v2.77.2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit

  gate:
    needs:
      - cargo-audit
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Require all jobs to pass or be skipped
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            exit 1
          fi
