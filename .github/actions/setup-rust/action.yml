name: "Rust: Setup"
description: >
  Install Rust toolchains for wasmCloud builds. Wraps `rustup` directly so
  the toolchain surface doesn't depend on dtolnay/rust-toolchain@master,
  which has no versioned releases. Optionally installs nightly (for
  `cargo +nightly fmt`), the wash CLI, and Zig/cargo-zigbuild for
  cross-compilation.
inputs:
  rust-toolchain:
    description: "Rust toolchain"
    required: false
    default: "stable"
  rust-targets:
    description: "Comma separated list of additional targets"
    required: false
    default: "wasm32-wasip1,wasm32-wasip2"
  rust-components:
    description: "Comma separated list of additional components"
    required: false
    default: "clippy,rustfmt"
  install-nightly:
    description: "Install the nightly toolchain with rustfmt (for `cargo +nightly fmt --check`)"
    required: false
    default: "false"
  install-wash:
    description: "Install the wasmCloud wash CLI"
    required: false
    default: "false"
  install-zigbuild:
    description: "Install Zig and cargo-zigbuild for cross-compilation"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      shell: bash
      env:
        TOOLCHAIN: ${{ inputs.rust-toolchain }}
        TARGETS: ${{ inputs.rust-targets }}
        # rust-src is required when using cargo-zigbuild for cross-compilation.
        COMPONENTS: ${{ inputs.install-zigbuild == 'true' && format('{0},rust-src', inputs.rust-components) || inputs.rust-components }}
      run: |
        set -euo pipefail
        # Accept either `clippy, rustfmt` or `clippy,rustfmt` for compatibility
        # with the previous dtolnay/rust-toolchain input format.
        COMPONENTS="${COMPONENTS// /}"
        TARGETS="${TARGETS// /}"
        rustup toolchain install "${TOOLCHAIN}" \
          --profile minimal \
          --component "${COMPONENTS}" \
          --target "${TARGETS}" \
          --no-self-update
        rustup default "${TOOLCHAIN}"

    - name: Install nightly toolchain
      if: ${{ inputs.install-nightly == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        rustup toolchain install nightly \
          --profile minimal \
          --component rustfmt \
          --no-self-update

    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

    - name: Install Zig for zigbuild
      if: ${{ inputs.install-zigbuild == 'true' }}
      uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      with:
        version: 0.13.0

    - name: Install cargo-zigbuild
      if: ${{ inputs.install-zigbuild == 'true' }}
      uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
      with:
        tool: cargo-zigbuild

    - name: Install wash CLI
      if: ${{ inputs.install-wash == 'true' }}
      uses: wasmcloud/setup-wash-action@47756fa211cc82f392c57e39504f43ef46fc0b3e # v2.1.0
