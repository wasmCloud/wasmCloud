name: "Rust: Setup"
description: >
  Install Rust toolchains for wasmCloud builds. Wraps `rustup` directly so
  the toolchain surface doesn't depend on dtolnay/rust-toolchain@master,
  which has no versioned releases. Optionally installs nightly (for
  `cargo +nightly fmt`), the wash CLI, and Zig/cargo-zigbuild for
  cross-compilation.
inputs:
  rust-toolchain:
    description: "Rust toolchain"
    required: false
    default: "stable"
  rust-targets:
    description: "Comma separated list of additional targets"
    required: false
    default: "wasm32-wasip1,wasm32-wasip2"
  rust-components:
    description: "Comma separated list of additional components"
    required: false
    default: "clippy,rustfmt"
  install-nightly:
    description: "Install the nightly toolchain with rustfmt (for `cargo +nightly fmt --check`)"
    required: false
    default: "false"
  install-wash:
    description: "Install the wasmCloud wash CLI"
    required: false
    default: "false"
  install-zigbuild:
    description: "Install Zig and cargo-zigbuild for cross-compilation"
    required: false
    default: "false"
  wasm-component-ld-version:
    description: "Version of standalone wasm-component-ld to install"
    required: false
    default: "0.5.24"

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      shell: bash
      env:
        TOOLCHAIN: ${{ inputs.rust-toolchain }}
        TARGETS: ${{ inputs.rust-targets }}
        # rust-src is required when using cargo-zigbuild for cross-compilation.
        COMPONENTS: ${{ inputs.install-zigbuild == 'true' && format('{0},rust-src', inputs.rust-components) || inputs.rust-components }}
      run: |
        set -euo pipefail
        # Accept either `clippy, rustfmt` or `clippy,rustfmt` for compatibility
        # with the previous dtolnay/rust-toolchain input format.
        COMPONENTS="${COMPONENTS// /}"
        TARGETS="${TARGETS// /}"
        # Install targets onto the named channel itself. Builds that run
        # outside the repo (e.g. a template scaffolded into a temp dir) see no
        # rust-toolchain.toml, so they use this default toolchain and need the
        # targets here.
        rustup toolchain install "${TOOLCHAIN}" \
          --profile minimal \
          --component "${COMPONENTS}" \
          --target "${TARGETS}" \
          --no-self-update
        rustup default "${TOOLCHAIN}"
        # Also add the targets to the toolchain rustup resolves *inside* this
        # repo. A checked-in rust-toolchain.toml pins a specific channel and
        # overrides `rustup default`, so in-repo cross builds use that pinned
        # toolchain — not the one installed above. Without this, `cargo build
        # --target` fails with a missing `core`/`std`. Run from the repo root,
        # `rustup target add` honors the override and auto-installs the pinned
        # toolchain if needed; it's a no-op when the target is already present.
        if [ -n "${TARGETS}" ]; then
          rustup target add ${TARGETS//,/ }
        fi

    - name: Install nightly toolchain
      if: ${{ inputs.install-nightly == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        rustup toolchain install nightly \
          --profile minimal \
          --component rustfmt \
          --no-self-update

    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        # Only save the cache on main pushes; PR runs restore but never save.
        # Tar+zstd of `target/` over the GHA cache API runs a very long time on
        # Windows runners and was timing out the `check (windows-latest)` job.
        # Main builds keep refreshing the cache PRs read from, so PR runs
        # don't need to save anything themselves.
        save-if: ${{ github.ref == 'refs/heads/main' }}
        # Drop `target/` from the cache on Windows. Git's tar.exe + zstd
        # over the GHA cache API is the slow path, and target/ is the bulk
        # of what gets tarred. Windows builds will recompile deps from the
        # cached registry source instead of restoring artifacts, which still
        # finishes well inside the job timeout. Linux/macOS keep target/
        # caching because their tar throughput handles it fine.
        cache-targets: ${{ runner.os != 'Windows' }}
        # Don't cache .cargo/bin.. rustup re-installs the toolchain on every
        # run regardless (it's idempotent and fast), and taiki-e/install-action
        # callers handle their own binary caching. Nothing else lands here.
        cache-bin: false

    - name: Install Zig for zigbuild
      if: ${{ inputs.install-zigbuild == 'true' }}
      uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      with:
        version: 0.13.0

    - name: Install cargo-zigbuild
      if: ${{ inputs.install-zigbuild == 'true' }}
      uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
      env:
        # Authenticate the action's GitHub API calls so they aren't throttled
        # by the 60/hr anonymous per-IP limit shared across hosted runners.
        GITHUB_TOKEN: ${{ github.token }}
      with:
        tool: cargo-zigbuild

    - name: Install wash CLI
      if: ${{ inputs.install-wash == 'true' }}
      uses: wasmcloud/setup-wash-action@47756fa211cc82f392c57e39504f43ef46fc0b3e # v2.1.0

    # The wasm32-wasip2 linker. The toolchain bundles one, but it lags the
    # standalone crate and is too old to decode the component-model
    # `(implements ..)` imports that wit-bindgen now emits — linking such a
    # component fails with "decoding custom section ... invalid leading byte".
    # Drop once a Rust release bundles wasm-component-ld >= 0.5.23.
    - name: Install cargo-binstall
      uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
      env:
        # Authenticate the action's GitHub API calls so they aren't throttled
        # by the 60/hr anonymous per-IP limit shared across hosted runners.
        GITHUB_TOKEN: ${{ github.token }}
      with:
        tool: cargo-binstall
    - name: Install wasm-component-ld
      shell: bash
      env:
        VERSION: ${{ inputs.wasm-component-ld-version }}
        # Authenticate cargo-binstall's GitHub API calls. Unauthenticated
        # requests share a 60/hr per-IP limit that hosted runners blow through,
        # returning 403. binstall then falls back to a source `cargo install`,
        # which rejects the `--install-path` below and fails the job. The token
        # raises the limit so the prebuilt release asset is used. `github.token`
        # (not `secrets`) is the only token context available in a composite
        # action; read-only access is sufficient for release-asset lookups.
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        # rustc resolves `wasm-component-ld` from the active toolchain's own
        # sysroot (lib/rustlib/<host>/bin), NOT from PATH, so binstalling into
        # ~/.cargo/bin would leave the build linking with the stale bundled
        # copy. Install directly over the bundled binary instead. `rustc` is
        # resolved from the repo root, so a checked-in rust-toolchain.toml pins
        # the same toolchain the build below uses. Targeting the native sysroot
        # dir keeps this working on Windows, where passing a bash-style linker
        # path to cargo would not.
        bindir="$(rustc --print sysroot)/lib/rustlib/$(rustc -vV | sed -n 's/^host: //p')/bin"
        cargo binstall --no-confirm --force \
          --install-path "${bindir}" \
          "wasm-component-ld@${VERSION}"
        "${bindir}/wasm-component-ld" --version
