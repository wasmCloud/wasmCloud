name: "Setup Rust example toolchains"
description: >
  Install everything needed to lint, build, and publish a wasmCloud Rust
  example: nightly Rust with rustfmt (for `cargo +nightly fmt --check`),
  stable Rust with clippy + rustfmt + wasm32-wasip2 (for clippy and the
  build), and the wash CLI (for `wash wit fetch`, `wash build`, and
  `wash oci push`). Designed to be called once per job; subsequent
  build-rust-example invocations in the same job reuse this setup.

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
      with:
        toolchain: nightly
        components: rustfmt
    - uses: ./.github/actions/setup-rust
    - uses: wasmcloud/setup-wash-action@47756fa211cc82f392c57e39504f43ef46fc0b3e # v2.1.0
