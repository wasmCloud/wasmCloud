[package]
name = "http-blobstore-service"
edition = "2024"
version = "0.1.0"

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "matched-path"] }
bytes = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wasip2 = "1.0"
wit-bindgen = "0.51"
wstd = "0.6"
wstd-axum = "0.6"

[profile.release]
lto = true
opt-level = "s"
strip = true
