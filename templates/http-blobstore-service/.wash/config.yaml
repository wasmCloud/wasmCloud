build:
  command: cargo build --target wasm32-wasip2 --release
  component_path: target/wasm32-wasip2/release/http_blobstore_service.wasm

dev:
  # Backend: filesystem (default)
  # Uncomment to choose where blobs are persisted on disk.
  # wasi_blobstore_path: /tmp/blobstore

  # Backend: nats
  # Uncomment to use NATS object store. Requires a running NATS server with JetStream.
  # wasi_blobstore_nats_url: nats://127.0.0.1:4222
