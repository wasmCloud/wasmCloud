[package]
name = "hello-world"
edition = "2024"
version = "0.1.0"

[lints]
workspace = true

[workspace]

[workspace.lints.rust]
warnings = "deny"
unsafe_code = "deny"
unused_extern_crates = "warn"
trivial_numeric_casts = "warn"
unstable_features = "warn"
unused_import_braces = "warn"
unused-lifetimes = "warn"
unused-macro-rules = "warn"

[workspace.lints.clippy]
unwrap_used = 'deny'
expect_used = 'deny'
panic = 'deny'
indexing_slicing = 'deny'
dbg_macro = 'deny'
join_absolute_paths = 'deny'
needless_collect = 'deny'
option_env_unwrap = 'deny'
panicking_unwrap = 'deny'
serde_api_misuse = 'deny'
transmute_ptr_to_ref = 'deny'
transmute_undefined_repr = 'deny'
trivially_copy_pass_by_ref = 'deny'
uninit_vec = 'deny'
unnecessary_box_returns = 'deny'

[lib]
crate-type = ["cdylib"]

[dependencies]
# `wstd` and its transitive `wasip2` together determine which
# `wasi-http` version the generated component exports. Pinning both
# keeps `wit/world.wit` in sync deterministically — bumping either
# requires bumping the world.wit version too (see comment there).
wstd = "=0.6.6"
wasip2 = "=1.0.3"

