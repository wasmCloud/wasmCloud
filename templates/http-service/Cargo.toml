[package]
name = "http-service"
edition = "2024"
version = "0.1.0"

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
axum = { version = "0.8", default-features = false, features = ["json", "query", "matched-path"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wstd = "0.6"
wstd-axum = "0.6"

[profile.release]
lto = true
opt-level = "s"
strip = true
