# `wasmcloud:app` is this template's own interface, not a registry package.
# Resolve it from the shared source at the workspace root instead of fetching;
# `wash wit fetch` copies it into the (gitignored) wit/deps/. The WASI 0.3
# packages have no override, so they are fetched from the default registry.
[overrides]
"wasmcloud:app" = { path = "../wasmcloud-app" }
