---
apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: messaging-kafka-demo
  annotations:
    version: v0.0.1
    description: |
      Echo demo in Rust, using the WebAssembly Component Model and WebAssembly Interfaces Types (WIT), along with
      the Kafka messaging provider.
spec:
  components:
    - name: echo
      type: component
      properties:
        image: ghcr.io/wasmcloud/components/echo-messaging-rust:0.1.0
      traits:
        # Govern the spread/scheduling of the component
        - type: spreadscaler
          properties:
            replicas: 1
        - type: link
          properties:
            target: kafka
            namespace: wasmcloud
            package: messaging
            interfaces: [consumer]
            target_config:
              - name: simple-subscription
                properties:
                  topic: wasmcloud.echo

    # Add a capability provider that implements `wasmcloud:messaging` using KAFKA
    - name: kafka
      type: capability
      properties:
        image: ghcr.io/wasmcloud/messaging-kafka:canary
