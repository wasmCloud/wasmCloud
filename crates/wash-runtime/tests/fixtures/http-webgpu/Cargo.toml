[package]
name = "http-webgpu"
edition = "2021"
version = "0.1.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = { workspace = true }
bytemuck = { workspace = true }
flume = { workspace = true, features = ["spin"] }
wstd = { workspace = true }
wgpu = { workspace = true, default-features = false, features = ["wasi", "wgsl"] }