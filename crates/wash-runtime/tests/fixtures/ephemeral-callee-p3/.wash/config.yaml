build:
  # `wash build` runs `wit fetch` (resolving the wkg.toml local refs), then this
  # command; a wasm32-wasip1 core module is wrapped into a component afterward.
  command: cargo build --target wasm32-wasip1 --release
  component_path: ../target/wasm32-wasip1/release/ephemeral_callee_p3.wasm
wit:
  # No external WIT deps to resolve (bindings come from a crate,
  # or the world is local-only).
  skip_fetch: true
