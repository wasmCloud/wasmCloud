[package]
name = "wash-runtime"
version.workspace = true
description = "Opinionated wasmtime wrapper that provides a runtime and workload API for executing Wasm components"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/wasmCloud/wasmCloud"
authors = ["The wasmCloud Team"]
categories = ["wasm"]
readme = "README.md"
# Not published to crates.io: the optional `wasi-webgpu` feature pulls in
# git-only deps (`wasi-graphics-context-wasmtime`, `wasi-webgpu-wasmtime`
# from wasi-gfx/wasi-gfx-runtime) that have no crates.io release, and
# cargo's publish manifest check rejects deps without a version
# requirement. Revisit once those crates are on crates.io or vendored.
publish = false
# Allowlist preserved for the eventual re-enable of publishing. Cargo
# always includes Cargo.toml, Cargo.lock, Cargo.toml.orig, and
# .cargo_vcs_info.json regardless. Anything else in the crate directory
# (notably tests/ with hundreds of MB of gitignored-but-still-cargo-
# visible fixtures, and any future scratch directory a contributor
# commits) stays out of the published crate unless explicitly added
# here.
include = [
    "src/**/*",
    "wit/**/*",
    "build.rs",
    "wkg.lock",
    "README.md",
    "LICENSE",
]

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[features]
default = ["wasi-config", "wasi-logging", "wasi-blobstore", "wasi-keyvalue", "wasmcloud-postgres", "washlet", "wasi-otel"]
oci = ["dep:oci-client", "dep:oci-wasm", "dep:docker_credential", "dep:sha2", "dep:wit-component"]
wasi-otel = []
washlet = ["oci"]
wasi-config = []
wasi-logging = []
wasi-blobstore = []
wasi-keyvalue = []
wasi-webgpu = ["dep:wasi-webgpu-wasmtime", "dep:wasi-graphics-context-wasmtime"]
wasmcloud-postgres = [
    "dep:tokio-postgres", "dep:tokio-postgres-rustls",
    "dep:deadpool-postgres", "dep:postgres-types",
    "dep:bigdecimal", "dep:pg_bigdecimal",
    "dep:bit-vec", "dep:cidr", "dep:geo-types",
    "dep:ulid",
]
wasip3 = ["wasmtime-wasi/p3", "wasmtime-wasi-http/p3"]

[dependencies]
anyhow = { workspace = true }
async-nats = { workspace = true, features = ["aws-lc-rs"] }
async-trait = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
futures = { workspace = true }
hostname = { workspace = true }
http-body-util = { workspace = true }
hyper = { workspace = true, features = ["server", "http1", "http2"] }
hyper-util = { workspace = true, features = ["client-legacy", "http1", "http2", "tokio", "server-auto"] }
moka = { workspace = true, features = ["sync"]}
names = { workspace = true }
redis = { workspace = true }
semver = { workspace = true }
sysinfo = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["sync", "net", "macros"] }
tracing = { workspace = true }
wasmtime = { workspace = true, features = ["anyhow", "component-model", "component-model-async", "cranelift", "pooling-allocator", "gc", "gc-null"] }
wasmtime-wasi = { workspace = true }
wasmtime-wasi-io = { workspace = true }
wasmtime-wasi-http = { workspace = true, features = ["default-send-request", "p2"] }
cap-net-ext = { workspace = true }
cap-std = { workspace = true }
io-lifetimes = { workspace = true }
rustix = { workspace = true }
rustls = { workspace = true, features = ["std", "tls12"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio-rustls = { workspace = true }
tokio-util = { workspace = true, features = ["rt"] }
tonic = { workspace = true, features = [
    "gzip",
    "tls-aws-lc",
    "transport",
    "router",
    "codegen",
    "tls-native-roots",
] }
tracing-subscriber = { workspace = true, features = ["env-filter", "ansi", "time", "json"] }
tracing-opentelemetry = { workspace = true }
pbjson = { workspace = true, default-features = true }
pbjson-types = { workspace = true, default-features = true }
prost = { workspace = true, default-features = true }
tonic-prost = { workspace = true, default-features = true }
opentelemetry = { workspace = true, features = ["trace", "metrics", "logs"] }
opentelemetry-appender-tracing = { workspace = true }
opentelemetry_sdk = { workspace = true, features = ["logs"] }
opentelemetry-http = { workspace = true }

# Otel dependencies (optional, behind 'wasi-otel' feature)
opentelemetry-otlp = { workspace = true, features = ["grpc-tonic","http-proto", "trace", "metrics", "logs"] }
opentelemetry-semantic-conventions = { workspace = true, features = ["semconv_experimental"] }
wasi-graphics-context-wasmtime = { git = "https://github.com/wasi-gfx/wasi-gfx-runtime.git", rev = "4aa7436d2e358df013a0216346ba23564dd0a2b9", optional = true }
wasi-webgpu-wasmtime = { git = "https://github.com/wasi-gfx/wasi-gfx-runtime.git", rev = "4aa7436d2e358df013a0216346ba23564dd0a2b9", optional = true }

# OCI dependencies (optional, behind 'oci' feature)
docker_credential = { workspace = true, optional = true }
oci-client = { workspace = true, optional = true, features = ["rustls-tls", "rustls-tls-native-roots"] }
oci-wasm = { workspace = true, optional = true, features = ["rustls-tls"] }
sha2 = { workspace = true, optional = true }
wit-component = { workspace = true, optional = true }

# PostgreSQL dependencies (optional, behind 'wasmcloud-postgres' feature)
bigdecimal = { optional = true, workspace = true }
bit-vec = { optional = true, workspace = true }
cidr = { optional = true, workspace = true, features = ["std"] }
deadpool-postgres = { optional = true, workspace = true, features = ["rt_tokio_1"] }
geo-types = { optional = true, workspace = true }
pg_bigdecimal = { optional = true, workspace = true }
postgres-types = { optional = true, workspace = true, features = ["derive", "with-serde_json-1", "with-chrono-0_4", "with-uuid-1", "with-geo-types-0_7", "with-bit-vec-0_6", "with-cidr-0_2", "array-impls"] }
tokio-postgres = { optional = true, workspace = true, features = [ "runtime", "with-serde_json-1", "with-chrono-0_4", "with-geo-types-0_7", "array-impls", "with-bit-vec-0_6", "with-uuid-1" ] }
tokio-postgres-rustls = { optional = true, workspace = true }
ulid = { optional = true, workspace = true, features = ["std"] }
url = { workspace = true }
webpki-roots = { workspace = true }

[build-dependencies]
anyhow = { workspace = true, default-features = true }
tonic-prost-build = { workspace = true, default-features = true }
pbjson-build = { workspace = true, default-features = true }
wasi-preview1-component-adapter-provider = "43"
wit-component = { workspace = true, default-features = false }

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
tracing-subscriber = { workspace = true }
reqwest = { workspace = true }
wat = { workspace = true, features = ["component-model"] }
gag = "1.0"
rcgen = { version = "0.14.7", default-features = false, features = ["crypto", "aws_lc_rs", "pem"] }
testcontainers = { workspace = true }
